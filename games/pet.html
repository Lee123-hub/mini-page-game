<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>电子宠物乐园</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui,sans-serif; background:linear-gradient(160deg,#fdf6ff,#f0f9ff,#fff9f0); min-height:100vh; color:#374151; }
.topbar { background:#fff; height:52px; box-shadow:0 2px 12px rgba(0,0,0,.06); display:flex; align-items:center; padding:0 16px; position:sticky; top:0; z-index:100; }
.topbar a { text-decoration:none; color:#c084fc; font-size:14px; font-weight:600; }
.topbar-title { flex:1; text-align:center; font-size:18px; font-weight:700; background:linear-gradient(135deg,#c084fc,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.photo-btn { background:none; border:none; font-size:20px; cursor:pointer; transition:transform .2s; }
.photo-btn:hover { transform:scale(1.2); }
.wrap { max-width:500px; margin:0 auto; padding:12px; }

/* SCENE */
.scene {
  position:relative; width:100%; height:300px;
  border-radius:20px; overflow:hidden;
  margin-bottom:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  cursor:crosshair;
  user-select:none;
}
.scene-bg { position:absolute; inset:0; transition:opacity .5s; }

/* ROOM scene */
.scene-room .scene-bg {
  background:linear-gradient(180deg, #fce7f3 0%, #fce7f3 55%, #f5deb3 55%);
}
.scene-room::before {
  content:""; position:absolute; inset:0;
  background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.04) 0px, rgba(0,0,0,.04) 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, rgba(0,0,0,.03) 0px, rgba(0,0,0,.03) 1px, transparent 1px, transparent 40px);
  top:55%;
}

/* GARDEN scene */
.scene-garden .scene-bg {
  background:linear-gradient(180deg, #bfdbfe 0%, #bfdbfe 50%, #86efac 50%);
}
/* BATH scene */
.scene-bath .scene-bg { background:linear-gradient(180deg,#e0f2fe,#bae6fd); }
/* BEDROOM scene */
.scene-bedroom .scene-bg { background:linear-gradient(180deg,#1e1b4b,#312e81,#4338ca); }
/* PLAYROOM scene */
.scene-playroom .scene-bg { background:linear-gradient(180deg,#fef3c7,#fde68a,#a7f3d0); }
/* SHOP scene */
.scene-shop .scene-bg { background:linear-gradient(180deg,#ede9fe,#ddd6fe,#c4b5fd); }

/* SCENE DECORATIONS */
.scene-deco { position:absolute; pointer-events:none; }
/* window */
.deco-window {
  right:16px; top:20px; width:70px; height:70px;
  background:linear-gradient(135deg,#bfdbfe,#93c5fd);
  border-radius:8px; border:4px solid #f9fafb;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.5);
}
.deco-window::before,.deco-window::after {
  content:""; position:absolute; background:rgba(255,255,255,.5);
}
.deco-window::before { left:50%; top:0; bottom:0; width:2px; transform:translateX(-50%); }
.deco-window::after { top:50%; left:0; right:0; height:2px; transform:translateY(-50%); }
/* bookshelf */
.deco-shelf {
  left:12px; top:30px; width:52px; height:70px;
  background:#92400e; border-radius:4px;
}
.deco-shelf::before {
  content:""; position:absolute;
  left:4px; top:10px; right:4px;
  height:8px; background:#fbbf24; border-radius:2px;
  box-shadow: 0 14px 0 #34d399, 0 28px 0 #60a5fa, 0 42px 0 #f472b6;
}
/* rug */
.deco-rug {
  bottom:30px; left:50%; transform:translateX(-50%);
  width:160px; height:40px;
  background:#fde68a; border-radius:50%;
  border:6px solid #fbbf24;
  box-shadow:0 0 0 3px #fde68a, 0 0 0 6px #fbbf24;
}
/* food bowl */
.deco-bowl {
  bottom:24px; left:60px; width:36px; height:22px;
  background:#e5e7eb; border-radius:0 0 20px 20px;
  border:3px solid #9ca3af;
  cursor:pointer; pointer-events:all;
  transition:transform .15s;
}
.deco-bowl:hover { transform:scale(1.15); }
.deco-bowl::before {
  content:"🍖"; position:absolute;
  font-size:12px; top:-14px; left:50%; transform:translateX(-50%);
}
/* bed cushion */
.deco-bed {
  bottom:20px; right:50px; width:60px; height:32px;
  background:#fce7f3; border-radius:16px;
  border:3px solid #f9a8d4;
  cursor:pointer; pointer-events:all;
  transition:transform .15s;
}
.deco-bed:hover { transform:scale(1.1); }
.deco-bed::before { content:"💤"; position:absolute; font-size:14px; top:-18px; left:50%; transform:translateX(-50%); }
/* toy ball */
.deco-ball {
  bottom:28px; left:50%; margin-left:20px;
  width:28px; height:28px;
  background:radial-gradient(circle at 35% 35%, #f87171, #b91c1c);
  border-radius:50%;
  cursor:pointer; pointer-events:all;
  transition:transform .15s;
}
.deco-ball:hover { transform:scale(1.2) rotate(20deg); }
.deco-ball::before { content:"🎾"; position:absolute; font-size:10px; top:-16px; left:50%; transform:translateX(-50%); }

/* GARDEN DECO */
.deco-sun {
  right:20px; top:15px; width:44px; height:44px;
  background:#fbbf24; border-radius:50%;
  box-shadow:0 0 0 6px #fde68a;
}
.deco-cloud {
  position:absolute; background:#fff; border-radius:20px;
  opacity:.9;
}
.deco-flower {
  position:absolute; bottom:55%; font-size:28px; pointer-events:none;
}
/* BATH DECO */
.deco-tub {
  bottom:20px; left:50%; transform:translateX(-50%);
  width:180px; height:70px;
  background:#fff; border-radius:0 0 50px 50px;
  border:4px solid #bae6fd;
}
.deco-tub::before {
  content:""; position:absolute; inset:8px 20px;
  background:linear-gradient(180deg,#e0f2fe,#bae6fd);
  border-radius:0 0 40px 40px;
}
.deco-bubble {
  position:absolute; background:rgba(255,255,255,.7);
  border-radius:50%; border:1px solid rgba(255,255,255,.9);
  animation:bubbleRise 2s ease-in infinite;
}
@keyframes bubbleRise {
  0% { transform:translateY(0) scale(1); opacity:.7; }
  100% { transform:translateY(-60px) scale(.5); opacity:0; }
}
/* BEDROOM DECO */
.deco-moon {
  right:24px; top:20px; width:40px; height:40px;
  background:#fde68a; border-radius:50%;
  box-shadow:0 0 16px #fde68a;
}
.deco-star {
  position:absolute; background:#fde68a; border-radius:50%;
  animation:twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity:1; } 50% { opacity:.3; }
}
.deco-zz {
  position:absolute; font-size:18px; color:#a5b4fc;
  animation:floatZz 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes floatZz {
  0% { transform:translateY(0) rotate(-10deg); opacity:0; }
  30% { opacity:1; }
  100% { transform:translateY(-50px) rotate(10deg); opacity:0; }
}

/* PET WRAPPER - draggable */
.pet-wrapper {
  position:absolute;
  width:90px; height:110px;
  cursor:grab;
  transition:filter .3s;
  z-index:10;
}
.pet-wrapper:active { cursor:grabbing; }
.pet-wrapper.is-clicked { animation:petClick .3s ease; }
@keyframes petClick {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.18) translateY(-6px); }
}
.pet-wrapper.is-happy { filter:drop-shadow(0 0 8px rgba(251,191,36,.7)); }
.pet-wrapper.is-sad { filter:grayscale(40%); }
.pet-wrapper.is-sick { filter:hue-rotate(60deg) saturate(.6); }
.pet-wrapper.is-excited { filter:drop-shadow(0 0 10px rgba(244,114,182,.8)); }

/* floating heart on click */
.float-heart {
  position:absolute; pointer-events:none; font-size:20px; z-index:20;
  animation:heartFloat 1.2s ease forwards;
}
@keyframes heartFloat {
  0% { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-60px) scale(.5); opacity:0; }
}

/* THOUGHT BUBBLE */
.thought {
  position:absolute; background:#fff; border-radius:14px;
  padding:4px 10px; font-size:12px; white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.12); pointer-events:none;
  z-index:15; transition:opacity .4s; top:-32px; left:50%;
  transform:translateX(-50%);
}
.thought::after {
  content:""; position:absolute; bottom:-6px; left:50%;
  transform:translateX(-50%);
  border:4px solid transparent; border-top-color:#fff;
}

/* SCENE LABEL */
.scene-label {
  position:absolute; bottom:8px; right:10px;
  background:rgba(255,255,255,.7); border-radius:12px;
  padding:2px 8px; font-size:11px; color:#374151;
  pointer-events:none; z-index:12;
}

/* ============ CSS PET ART ============ */
/* Shared pet parts */
.pet-figure { position:relative; width:90px; height:110px; }

/* --- CAT --- */
.breed-cat .pet-ear-l, .breed-cat .pet-ear-r {
  position:absolute; top:2px; width:0; height:0;
  border-left:10px solid transparent; border-right:10px solid transparent;
  border-bottom:22px solid #f4a0a0;
}
.breed-cat .pet-ear-l { left:8px; transform:rotate(-10deg); }
.breed-cat .pet-ear-r { right:8px; transform:rotate(10deg); }
.breed-cat .pet-head {
  position:absolute; top:14px; left:10px;
  width:70px; height:62px;
  background:#fde8d0; border-radius:50%;
}
.breed-cat .pet-body {
  position:absolute; top:62px; left:12px;
  width:66px; height:52px;
  background:#fde8d0; border-radius:28px 28px 22px 22px;
}
.breed-cat .pet-tail {
  position:absolute; bottom:18px; right:2px;
  width:12px; height:44px;
  background:#f4a0a0; border-radius:6px;
  transform:rotate(25deg); transform-origin:bottom center;
}
.breed-cat .pet-limb-l, .breed-cat .pet-limb-r {
  position:absolute; bottom:0; width:18px; height:16px;
  background:#fde8d0; border-radius:0 0 10px 10px;
}
.breed-cat .pet-limb-l { left:10px; }
.breed-cat .pet-limb-r { right:10px; }

/* --- DOG --- */
.breed-dog .pet-ear-l, .breed-dog .pet-ear-r {
  position:absolute; top:18px; width:24px; height:34px;
  background:#d4956a; border-radius:4px 4px 12px 12px;
}
.breed-dog .pet-ear-l { left:3px; transform:rotate(-8deg); }
.breed-dog .pet-ear-r { right:3px; transform:rotate(8deg); }
.breed-dog .pet-head {
  position:absolute; top:10px; left:8px;
  width:74px; height:66px;
  background:#f5deb3; border-radius:50%;
}
.breed-dog .pet-snout {
  position:absolute; top:44px; left:50%; transform:translateX(-50%);
  width:36px; height:24px;
  background:#e8c49a; border-radius:12px;
}
.breed-dog .pet-snout::before {
  content:""; position:absolute; top:4px; left:50%;
  transform:translateX(-50%);
  width:10px; height:7px;
  background:#8B4513; border-radius:50%;
}
.breed-dog .pet-body {
  position:absolute; top:62px; left:8px;
  width:74px; height:52px;
  background:#f5deb3; border-radius:28px 28px 22px 22px;
}
.breed-dog .pet-tail {
  position:absolute; bottom:22px; right:0;
  width:10px; height:36px;
  background:#e8c49a; border-radius:6px;
  transform:rotate(30deg); transform-origin:bottom;
}
.breed-dog .pet-limb-l, .breed-dog .pet-limb-r {
  position:absolute; bottom:0; width:18px; height:16px;
  background:#f5deb3; border-radius:0 0 10px 10px;
}
.breed-dog .pet-limb-l { left:10px; }
.breed-dog .pet-limb-r { right:10px; }

/* --- RABBIT --- */
.breed-rabbit .pet-ear-l, .breed-rabbit .pet-ear-r {
  position:absolute; top:-20px; width:14px; height:52px;
  background:#fff; border-radius:7px;
  border:2px solid #ffb3d1;
}
.breed-rabbit .pet-ear-l { left:16px; transform:rotate(-8deg); }
.breed-rabbit .pet-ear-r { right:16px; transform:rotate(8deg); }
.breed-rabbit .pet-ear-l::before, .breed-rabbit .pet-ear-r::before {
  content:""; position:absolute; inset:4px 3px;
  background:#ffb3d1; border-radius:5px;
}
.breed-rabbit .pet-head {
  position:absolute; top:16px; left:8px;
  width:74px; height:68px;
  background:#fff; border-radius:50%;
  border:2px solid #f3e8ff;
}
.breed-rabbit .pet-body {
  position:absolute; top:68px; left:10px;
  width:70px; height:50px;
  background:#fff; border-radius:28px 28px 24px 24px;
  border:2px solid #f3e8ff;
}
.breed-rabbit .pet-tail {
  position:absolute; bottom:10px; right:2px;
  width:14px; height:14px;
  background:#f3e8ff; border-radius:50%;
}
.breed-rabbit .pet-limb-l, .breed-rabbit .pet-limb-r {
  position:absolute; bottom:0; width:18px; height:16px;
  background:#fff; border-radius:0 0 10px 10px;
  border:2px solid #f3e8ff;
}
.breed-rabbit .pet-limb-l { left:10px; }
.breed-rabbit .pet-limb-r { right:10px; }

/* --- PANDA --- */
.breed-panda .pet-ear-l, .breed-panda .pet-ear-r {
  position:absolute; top:8px; width:22px; height:22px;
  background:#2d2d2d; border-radius:50%;
}
.breed-panda .pet-ear-l { left:10px; }
.breed-panda .pet-ear-r { right:10px; }
.breed-panda .pet-head {
  position:absolute; top:16px; left:8px;
  width:74px; height:66px;
  background:#fff; border-radius:50%;
}
.breed-panda .pet-eye-patch-l, .breed-panda .pet-eye-patch-r {
  position:absolute; width:20px; height:16px;
  background:#2d2d2d; border-radius:50%; top:22px;
}
.breed-panda .pet-eye-patch-l { left:12px; transform:rotate(-10deg); }
.breed-panda .pet-eye-patch-r { right:12px; transform:rotate(10deg); }
.breed-panda .pet-body {
  position:absolute; top:68px; left:8px;
  width:74px; height:52px;
  background:#fff; border-radius:28px 28px 22px 22px;
  border:2px solid #e5e7eb;
}
.breed-panda .pet-limb-l, .breed-panda .pet-limb-r {
  position:absolute; bottom:0; width:20px; height:18px;
  background:#2d2d2d; border-radius:0 0 10px 10px;
}
.breed-panda .pet-limb-l { left:8px; }
.breed-panda .pet-limb-r { right:8px; }

/* --- HAMSTER --- */
.breed-hamster .pet-head {
  position:absolute; top:8px; left:4px;
  width:82px; height:72px;
  background:#f4c88e; border-radius:50%;
}
.breed-hamster .pet-cheek-l, .breed-hamster .pet-cheek-r {
  position:absolute; width:28px; height:26px;
  background:#ff9999; border-radius:50%; top:36px; opacity:.7;
}
.breed-hamster .pet-cheek-l { left:6px; }
.breed-hamster .pet-cheek-r { right:6px; }
.breed-hamster .pet-ear-l, .breed-hamster .pet-ear-r {
  position:absolute; top:4px; width:18px; height:18px;
  background:#f4c88e; border-radius:50%;
  border:3px solid #ffbb77;
}
.breed-hamster .pet-ear-l { left:10px; }
.breed-hamster .pet-ear-r { right:10px; }
.breed-hamster .pet-body {
  position:absolute; top:64px; left:8px;
  width:74px; height:50px;
  background:#f4c88e; border-radius:28px 28px 24px 24px;
}
.breed-hamster .pet-limb-l, .breed-hamster .pet-limb-r {
  position:absolute; bottom:0; width:18px; height:14px;
  background:#f4c88e; border-radius:0 0 10px 10px;
}
.breed-hamster .pet-limb-l { left:10px; }
.breed-hamster .pet-limb-r { right:10px; }

/* --- CHINCHILLA --- */
.breed-chinchilla .pet-ear-l, .breed-chinchilla .pet-ear-r {
  position:absolute; top:0; width:22px; height:26px;
  background:#d4c5e2; border-radius:50% 50% 0 0;
}
.breed-chinchilla .pet-ear-l { left:12px; }
.breed-chinchilla .pet-ear-r { right:12px; }
.breed-chinchilla .pet-head {
  position:absolute; top:16px; left:8px;
  width:74px; height:66px;
  background:#d4c5e2; border-radius:50%;
}
.breed-chinchilla .pet-body {
  position:absolute; top:66px; left:6px;
  width:78px; height:54px;
  background:#d4c5e2; border-radius:28px 28px 24px 24px;
}
.breed-chinchilla .pet-tail {
  position:absolute; bottom:14px; right:-2px;
  width:20px; height:40px;
  background:#c4b3d4; border-radius:10px;
  transform:rotate(20deg);
}
.breed-chinchilla .pet-limb-l, .breed-chinchilla .pet-limb-r {
  position:absolute; bottom:0; width:18px; height:16px;
  background:#d4c5e2; border-radius:0 0 10px 10px;
}
.breed-chinchilla .pet-limb-l { left:10px; }
.breed-chinchilla .pet-limb-r { right:10px; }

/* SHARED EYE / NOSE / MOUTH - positioned on head */
.pet-eye-l, .pet-eye-r {
  position:absolute; width:10px; height:10px;
  background:#2d2d2d; border-radius:50%;
  top:26px;
}
.pet-eye-l { left:18px; }
.pet-eye-r { right:18px; }
.pet-eye-l::after, .pet-eye-r::after {
  content:""; position:absolute;
  width:3px; height:3px; background:#fff;
  border-radius:50%; top:1px; right:1px;
}
/* sad eyes - droopy */
.mood-sad .pet-eye-l, .mood-sad .pet-eye-r { border-radius:50% 50% 0 0; height:8px; }
/* excited eyes - big sparkle */
.mood-excited .pet-eye-l, .mood-excited .pet-eye-r {
  width:12px; height:12px;
  box-shadow:0 0 0 2px rgba(251,191,36,.5);
}
.pet-nose {
  position:absolute; width:8px; height:6px;
  background:#f4a0a0; border-radius:50%; top:36px; left:50%;
  transform:translateX(-50%);
}
.breed-dog .pet-nose { width:12px; height:9px; background:#8B4513; top:10px; }
.pet-mouth {
  position:absolute; width:16px; height:6px;
  border-bottom:2px solid #d97706; border-radius:0 0 8px 8px;
  top:44px; left:50%; transform:translateX(-50%);
}
.mood-sad .pet-mouth {
  border-bottom:none; border-top:2px solid #6b7280;
  border-radius:8px 8px 0 0; top:46px;
}
.mood-excited .pet-mouth {
  width:20px; height:9px; border-bottom-width:3px; border-color:#f472b6;
}
/* whiskers for cat */
.breed-cat .whisker {
  position:absolute; height:1px; background:#9ca3af; top:36px;
}
.breed-cat .whisker-l1 { left:4px; width:22px; transform:rotate(-10deg); }
.breed-cat .whisker-l2 { left:4px; width:22px; transform:rotate(10deg); top:40px; }
.breed-cat .whisker-r1 { right:4px; width:22px; transform:rotate(10deg); }
.breed-cat .whisker-r2 { right:4px; width:22px; transform:rotate(-10deg); top:40px; }

/* mood idle animations */
@keyframes bobNormal { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes bounceHappy { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1.08) translateY(-8px)} }
@keyframes wiggleExcited { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
@keyframes swaySad { 0%,100%{transform:translateX(-3px) rotate(-2deg)} 50%{transform:translateX(3px) rotate(2deg)} }
@keyframes pulseSick { 0%,100%{transform:scale(1)} 50%{transform:scale(.96)} }

.pet-figure.mood-normal { animation:bobNormal 2s ease-in-out infinite; }
.pet-figure.mood-happy { animation:bounceHappy .8s ease-in-out infinite; }
.pet-figure.mood-excited { animation:wiggleExcited .35s ease-in-out infinite; }
.pet-figure.mood-sad { animation:swaySad 2.5s ease-in-out infinite; }
.pet-figure.mood-sick { animation:pulseSick 2s ease-in-out infinite; }

/* COSTUME overlay emoji */
.pet-costume {
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  font-size:22px; z-index:5; pointer-events:none;
}

/* INFO BAR */
.info-bar {
  display:flex; gap:6px; flex-wrap:wrap; align-items:center;
  padding:6px 10px; background:#fff; border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:10px;
  font-size:12px;
}
.info-name { font-weight:700; color:#374151; font-size:14px; }
.badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-mood { background:#fce7f3; color:#be185d; }
.badge-breed { background:#d1fae5; color:#065f46; }
.badge-level { background:#fef3c7; color:#92400e; }
.badge-age { background:#e0e7ff; color:#4338ca; }
.badge-tag { background:#ede9fe; color:#5b21b6; }

/* STATS compact 2-col grid */
.stats-card {
  background:#fff; border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  padding:10px 12px; margin-bottom:10px;
}
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:6px 12px;
}
.stat-row {
  display:flex; align-items:center; gap:5px;
}
.stat-row.full { grid-column:1/-1; }
.stat-icon { font-size:12px; width:16px; text-align:center; }
.stat-bar-bg {
  flex:1; height:7px; background:#f3f4f6;
  border-radius:6px; overflow:hidden; min-width:40px;
}

<script>
// ===== BREEDS =====
const BREEDS = [
  {name:'猫咪', cls:'breed-cat'},
  {name:'犬犬', cls:'breed-dog'},
  {name:'兔子', cls:'breed-rabbit'},
  {name:'熊猫', cls:'breed-panda'},
  {name:'仓鼠', cls:'breed-hamster'},
  {name:'龙猫', cls:'breed-chinchilla'}
];
const BREED_EMOJIS = ['🐱','🐶','🐰','🐼','🐹','🐭'];
const MOODS = ['happy','normal','sad','sick','excited'];
const MOOD_LABELS = {happy:'开心✨',normal:'普通',sad:'难过',sick:'生病😷',excited:'兴奋🎉'};
const COSTUMES = ['','🎩','🎀','👑','🎓','🌸'];
const THOUGHTS = {
  normal:['在想什么呢…','好无聊哦~','主人在吗？','饿了吗…','要不要玩？'],
  happy:['好开心呀！','今天真棒！','主人最好了','嘿嘿~','哇哦！'],
  sad:['好难过…','不开心了…','呜呜…','想要抱抱…','没精神…'],
  excited:['哇哇哇！','超兴奋！','快来快来！','好期待！'],
  sick:['头好晕…','不舒服…','好难受哦…','想睡觉…']
};
const IDLE_THOUGHTS = ['咕~咕咕~','有没有零食？','今天天气真好','主人去哪了？','想出去玩！','困了~','好想被夸夸'];

// ===== STATE =====
let S;
const DEFAULT_STATE = () => ({
  name:'',breed:0,age:0,level:1,interactions:0,
  hunger:80,thirst:80,mood:80,energy:80,clean:80,affection:50,growth:0,
  moodState:'normal',sick:false,costume:0,
  growthTags:{athletic:0,scholar:0,gourmet:0,social:0,cozy:0},
  photos:[],diary:[],lastDecay:Date.now(),named:false,
  petX:160,petY:150
});

function load(){
  try{ S=JSON.parse(localStorage.getItem('petgame_v2'))||DEFAULT_STATE(); }
  catch(e){ S=DEFAULT_STATE(); }
  ['photos','diary'].forEach(k=>{ if(!S[k]) S[k]=[]; });
  if(!S.growthTags) S.growthTags={athletic:0,scholar:0,gourmet:0,social:0,cozy:0};
  if(S.petX===undefined){ S.petX=160; S.petY=150; }
}
function save(){ localStorage.setItem('petgame_v2',JSON.stringify(S)); }
function clamp(v,mn=0,mx=100){ return Math.max(mn,Math.min(mx,v)); }
function stat(k,d){ S[k]=clamp(S[k]+(d||0)); }

function recalcMood(){
  if(S.sick){ S.moodState='sick'; return; }
  const m=S.mood;
  S.moodState = m>=80?'excited': m>=60?'happy': m>=35?'normal':'sad';
}

// ===== SCENE =====
let currentScene='room', lastTab='feed', lastAction='';
const SCENES = {
  room:    {cls:'scene-room',    label:'🏠 我的房间'},
  garden:  {cls:'scene-garden',  label:'🌸 花园'},
  bath:    {cls:'scene-bath',    label:'🛁 浴室'},
  bedroom: {cls:'scene-bedroom', label:'🌙 卧室'},
  playroom:{cls:'scene-playroom',label:'🎮 游乐室'},
  shop:    {cls:'scene-shop',    label:'🛍️ 小卖部'}
};

function updateScene(){
  if(lastAction==='sleep'||S.energy<20) currentScene='bedroom';
  else if(lastAction==='bath'||lastAction==='groom') currentScene='bath';
  else if(lastTab==='play') currentScene='playroom';
  else if(lastTab==='feed'&&S.interactions>3) currentScene='shop';
  else if(S.age>=3) currentScene='garden';
  else currentScene='room';

  const sceneEl=document.getElementById('scene');
  Object.values(SCENES).forEach(s=>sceneEl.classList.remove(s.cls));
  sceneEl.classList.add(SCENES[currentScene].cls);
  document.getElementById('scene-label').textContent=SCENES[currentScene].label;
  buildSceneDecos();
}

function buildSceneDecos(){
  const el=document.getElementById('scene-decos');
  if(currentScene==='room'){
    el.innerHTML=`
      <div class="scene-deco deco-window"></div>
      <div class="scene-deco deco-shelf"></div>
      <div class="scene-deco deco-rug"></div>
      <div class="scene-deco deco-bowl" onclick="doAction('fruit')"></div>
      <div class="scene-deco deco-bed" onclick="doAction('sleep')"></div>
      <div class="scene-deco deco-ball" onclick="doAction('ball')"></div>`;
  } else if(currentScene==='garden'){
    el.innerHTML=`
      <div style="position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(180deg,#86efac,#4ade80);border-radius:0 0 20px 20px"></div>
      <div class="scene-deco deco-sun"></div>
      <div class="scene-deco deco-cloud" style="left:30px;top:30px;width:70px;height:22px"></div>

function renderPetFigure(){

  fig.className = 'pet-figure ' + breed.cls + ' mood-' + S.moodState;

  // Build inner HTML based on breed
  let inner = '';
  // Ears
  inner += '<div class="pet-ear-l"></div><div class="pet-ear-r"></div>';

  // Head
  let headInner = '';
  if(breed.cls === 'breed-panda'){
    headInner += '<div class="pet-eye-patch-l"></div><div class="pet-eye-patch-r"></div>';
  }
  if(breed.cls === 'breed-hamster'){
    headInner += '<div class="pet-cheek-l"></div><div class="pet-cheek-r"></div>';
  }
  headInner += '<div class="pet-eye-l"></div><div class="pet-eye-r"></div>';

  }

  inner += '<div class="pet-body"><div class="pet-limb-l"></div><div class="pet-limb-r"></div></div>';

  recalcMood();

  updateScene();

  const breed = BREEDS[S.breed];
  document.getElementById('info-name').textContent = S.name;
  document.getElementById('badge-breed').textContent = breed.name;

  document.getElementById('badge-level').textContent = 'Lv.' + S.level;

  // Growth tags
  const infoBar = document.getElementById('info-bar');
  infoBar.querySelectorAll('.badge-tag').forEach(e=>e.remove());
  getGrowthTags().forEach(t=>{
    const b = document.createElement('span');
    b.className = 'badge badge-tag';
    b.textContent = t;
    infoBar.appendChild(b);
  });

  // Stat bars
  const barMap = {hunger:'hunger',thirst:'thirst',mood:'mood',energy:'energy',clean:'clean',affection:'affection'};
  for(const [k] of Object.entries(barMap)){

  }
  document.getElementById('bar-growth').style.width = S.growth + '%';

  updateButtons();
  save();

function getGrowthTags(){
  const g = S.growthTags, tags = [];
  if(g.athletic>=15) tags.push('+运动🏃');
  if(g.scholar>=15)  tags.push('+学霸📚');
  if(g.gourmet>=15)  tags.push('+吃货🍰');
  if(g.social>=15)   tags.push('+社牛🎉');
  if(g.cozy>=15)     tags.push('+宅宝💤');
  return tags;
}

function updateButtons(){
  const lowEnergy = S.energy < 10;
  const freeActions = ['water','sleep','temp','medicine'];
  document.querySelectorAll('.action-btn').forEach(btn=>{
    btn.disabled = false;
  });
  if(lowEnergy){
    document.querySelectorAll('.action-btn').forEach(btn=>{
      const id = btn.id.replace('btn-','');
      if(!freeActions.includes(id)) btn.disabled = true;
    });
  }
  const performBtn = document.getElementById('btn-perform');
  if(performBtn && S.affection < 30) performBtn.disabled = true;
  const sleepBtn = document.getElementById('btn-sleep');
  if(sleepBtn) sleepBtn.disabled = S.energy >= 40;
  const medBtn = document.getElementById('btn-medicine');
  if(medBtn) medBtn.disabled = !S.sick;
}

// ===== DRAG & CLICK =====
let isDragging = false, dragOX = 0, dragOY = 0, didDrag = false;
const SCENE_W = 500, SCENE_H = 300, PET_W = 90, PET_H = 110;

function initDrag(){
  const wrapper = document.getElementById('pet-wrapper');
  const scene   = document.getElementById('scene');

  wrapper.addEventListener('mousedown', e=>{
    isDragging = true; didDrag = false;
    const rect = wrapper.getBoundingClientRect();
    dragOX = e.clientX - rect.left;
    dragOY = e.clientY - rect.top;
    wrapper.style.transition = 'none';
    e.preventDefault();
  });

  wrapper.addEventListener('touchstart', e=>{
    isDragging = true; didDrag = false;
    const t = e.touches[0];
    const rect = wrapper.getBoundingClientRect();
    dragOX = t.clientX - rect.left;
    dragOY = t.clientY - rect.top;
    wrapper.style.transition = 'none';
    e.preventDefault();
  }, {passive:false});

  document.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    didDrag = true;
    const scRect = scene.getBoundingClientRect();
    let x = e.clientX - scRect.left - dragOX;
    let y = e.clientY - scRect.top  - dragOY;
    x = Math.max(0, Math.min(x, scRect.width  - PET_W));
    y = Math.max(0, Math.min(y, scRect.height - PET_H));
    wrapper.style.left = x + 'px';
    wrapper.style.top  = y + 'px';
    S.petX = x; S.petY = y;
    checkHotspots(x, y);
  });

  document.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    didDrag = true;
    const t = e.touches[0];
    const scRect = scene.getBoundingClientRect();
    let x = t.clientX - scRect.left - dragOX;
    let y = t.clientY - scRect.top  - dragOY;
    x = Math.max(0, Math.min(x, scRect.width  - PET_W));
    y = Math.max(0, Math.min(y, scRect.height - PET_H));
    wrapper.style.left = x + 'px';
    wrapper.style.top  = y + 'px';
    S.petX = x; S.petY = y;
    checkHotspots(x, y);
    e.preventDefault();
  }, {passive:false});

  const stopDrag = () => {
    if(!isDragging) return;
    isDragging = false;
    wrapper.style.transition = '';
    if(!didDrag) petClick();
  };
  document.addEventListener('mouseup', stopDrag);
  document.addEventListener('touchend', stopDrag);
}

let lastHotspotAction = null, hotspotCooldown = false;
function checkHotspots(px, py){
  if(hotspotCooldown || currentScene !== 'room') return;
  const hotspots = [
    {x:44,  y:220, action:'fruit', label:'食物'},
    {x:200, y:210, action:'sleep', label:'床铺'},
    {x:170, y:218, action:'ball',  label:'球球'}
  ];
  for(const h of hotspots){
    const dx = px + PET_W/2 - h.x;
    const dy = py + PET_H/2 - h.y;
    if(Math.sqrt(dx*dx + dy*dy) < 45){
      hotspotCooldown = true;
      showToast('靠近了' + h.label + '！', '#fbbf24');
      setTimeout(()=>{
        doAction(h.action);
        hotspotCooldown = false;
      }, 600);
      break;
    }
  }
}

function doAction(id){
  const act = ACTIONS[id];
  if(!act) return;
  if(act.req && !act.req()){ showToast('条件不满足哦~','#fbbf24'); return; }
  if(act.cost) stat('energy', -act.cost);
  const msgs = act.fn();
  S.interactions++;
  lastAction = id;
  addGrowthPoints(3);
  msgs.forEach((m,i)=>setTimeout(()=>showToast(m),i*220));
  render();
}

function addGrowthPoints(pts){
  S.growth = clamp(S.growth + pts);
  if(S.growth >= 100){ S.growth = 0; levelUp(); }
}

function levelUp(){
  S.level++;
  const keys = ['hunger','thirst','mood','energy','clean','affection'];
  const labels = {hunger:'饱食',thirst:'解渴',mood:'心情',energy:'精力',clean:'清洁',affection:'亲密'};
  const chosen = [];
  for(let i=0;i<2;i++){
    const k = keys[Math.floor(Math.random()*keys.length)];
    stat(k,5); chosen.push(labels[k]+'+5');
  }
  document.getElementById('levelup-pet').textContent = BREED_EMOJIS[S.breed];
  document.getElementById('levelup-title').textContent = '升级啦！Lv.'+S.level+' 🎉';
  document.getElementById('levelup-bonuses').textContent = chosen.join(' · ');
  const ov = document.getElementById('levelup-overlay');
  ov.classList.remove('hidden');
  setTimeout(()=>ov.classList.add('hidden'), 3000);
}

function startTimers(){
  setInterval(()=>{
    const now = Date.now();
    const ticks = (now - S.lastDecay) / 30000;
    S.lastDecay = now;
    S.hunger = clamp(S.hunger - 3*ticks);
    S.thirst = clamp(S.thirst - 4*ticks);
    S.clean  = clamp(S.clean  - 2*ticks);
    S.energy = clamp(S.energy + 1*ticks);
    if(S.hunger<20) S.mood = clamp(S.mood - 5*ticks);
    if(S.thirst<20) S.mood = clamp(S.mood - 5*ticks);
    if(S.clean <20) S.mood = clamp(S.mood - 10*ticks);
    render();
  }, 30000);

  setInterval(()=>{ S.age++; save(); }, 300000);

  setInterval(()=>{
    if(Math.random()<0.3 && document.getElementById('event-overlay').classList.contains('hidden')){
      triggerRandomEvent();
    }
  }, 60000);

  setInterval(updateThought, 8000);
  updateThought();
}

function updateThought(){
  const pool = THOUGHTS[S.moodState] || THOUGHTS.normal;
  const all = [...pool, ...IDLE_THOUGHTS];
  const t = all[Math.floor(Math.random()*all.length)];
  const el = document.getElementById('thought');
  el.style.opacity = '0';
  setTimeout(()=>{ el.textContent = t; el.style.opacity = '1'; el.style.transition = 'opacity .5s'; }, 300);
}

// ===== TOAST =====
function showToast(msg, color='#c084fc'){
  const tc = document.getElementById('toast-container');
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  div.style.color = color;
  div.style.borderLeft = '3px solid ' + color;
  tc.appendChild(div);
  setTimeout(()=>div.remove(), 1600);
}

// ===== TABS =====
let currentTab = 'feed';
function switchTab(tab){
  currentTab = tab;
  lastTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['feed','play','care','bond'][i]===tab);
  });
  document.querySelectorAll('.tab-content').forEach(c=>{
    c.classList.toggle('active', c.id==='tab-'+tab);
  });
  updateScene();
}

// ===== NAMING =====
let selectedBreed = 0;
function selectBreed(idx){
  selectedBreed = idx;
  document.querySelectorAll('.breed-btn').forEach((b,i)=>b.classList.toggle('selected',i===idx));
}
function confirmNaming(){
  const n = document.getElementById('pet-name-input').value.trim();
  if(!n){ showToast('请给宠物起个名字~','#ef4444'); return; }
  S.name = n; S.breed = selectedBreed; S.named = true;
  document.getElementById('naming-overlay').classList.add('hidden');
  render();
  showToast('欢迎，'+n+'！💕','#f472b6');
}

// ===== PHOTO GALLERY =====
function openPhotoGallery(){
  const grid = document.getElementById('photo-grid');
  if(S.photos.length===0){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#9ca3af;padding:16px">还没有照片哦~<br>去拍照留念吧！📷</div>';
  } else {
    grid.innerHTML = S.photos.map(p=>`
      <div class="polaroid" style="--rot:${p.rot}deg">
        <div class="polaroid-emoji">${p.emoji}</div>
        <div class="polaroid-info">Lv.${p.level}<br>${p.age}天<br>${p.date}</div>
      </div>`).join('');
  }
  document.getElementById('gallery-overlay').classList.remove('hidden');
}
function closeGallery(){ document.getElementById('gallery-overlay').classList.add('hidden'); }

function confirmReset(){
  if(confirm('确定要重置宠物吗？所有数据将清除！')){
    localStorage.removeItem('petgame_v2');
    location.reload();
  }
}

document.getElementById('levelup-overlay').addEventListener('click',function(){
  this.classList.add('hidden');
});

// ===== INIT =====
load();
if(!S.named){
  document.getElementById('naming-overlay').classList.remove('hidden');
} else {
  document.getElementById('naming-overlay').classList.add('hidden');
}
render();
initDrag();
buildSceneDecos();
startTimers();
</script>
</body>
</html>
