<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放置挂机战斗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8f5ff;color:#2d3a4a;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:linear-gradient(135deg,#ffffff,#f0f8ff);padding:8px 16px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #b8deff;flex-shrink:0;box-shadow:0 2px 8px rgba(100,160,255,0.15)}
#topbar a{color:#5588cc;text-decoration:none;font-size:13px}
#topbar a:hover{color:#2244aa}
#topbar h1{font-size:16px;background:linear-gradient(135deg,#ff7eb3,#ff9d6c,#ffcc5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
#battle-canvas{width:100%;display:block;flex-shrink:0}
#ui{flex:1;display:flex;gap:6px;padding:6px;overflow:hidden;min-height:0}
.panel{background:#ffffff;border:1px solid #c8e4ff;border-radius:10px;padding:8px;overflow:hidden;box-shadow:0 2px 8px rgba(100,160,255,0.1)}
#left-panel{width:160px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
#center-panel{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
#right-panel{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.panel-title{font-size:12px;color:#7aaad0;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;border-bottom:1px solid #d8eeff;padding-bottom:3px;font-weight:700}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;color:#334455}
.stat-val{color:#d05010;font-weight:700}
.exp-bar-wrap{background:#e8f0ff;border-radius:4px;height:9px;overflow:hidden;margin:4px 0}
.exp-bar{height:100%;background:linear-gradient(90deg,#ff9d6c,#ffcc5c);border-radius:4px;transition:width 0.3s}
.stage-ctrl{display:flex;align-items:center;justify-content:space-between;gap:4px}
.stage-btn{background:#e8f4ff;border:1px solid #99ccff;color:#4488cc;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.stage-btn:hover{background:#cce8ff;color:#2255aa}
.stage-name{flex:1;text-align:center;font-size:13px;color:#ff7eb3;font-weight:700}
.chest-grid{display:flex;flex-wrap:wrap;gap:5px;overflow-y:auto;max-height:130px}
.chest-item{width:44px;height:44px;border-radius:8px;border:2px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;position:relative;flex-shrink:0;background:#f8fcff}
.chest-item .badge{position:absolute;top:-5px;right:-5px;background:#ff6688;color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-weight:700}
.chest-item.selected{outline:2px solid #ff7eb3}
.equip-slots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.equip-slot{background:#f0f8ff;border:1px solid #c8e0ff;border-radius:8px;padding:5px;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:#aabbcc;cursor:pointer;position:relative;overflow:hidden}
.equip-slot .slot-name{font-size:11px;color:#7799bb;font-weight:600}
.equip-slot .item-name{font-size:11px;text-align:center;line-height:1.3;margin-top:3px;font-weight:600}
.inv-grid{display:flex;flex-wrap:wrap;gap:4px;overflow-y:auto;flex:1;min-height:0;align-content:flex-start}
.inv-item{width:52px;height:52px;border-radius:7px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;text-align:center;line-height:1.3;padding:3px;position:relative;background:#f8fcff}
.inv-item:hover{filter:brightness(0.95) saturate(1.3)}
.inv-item.equipped-item{border-style:dashed}
.action-row{display:flex;gap:5px;flex-shrink:0}
.act-btn{flex:1;background:#f0f8ff;border:1px solid #99ccff;color:#4488cc;padding:5px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.act-btn:hover{background:#ddeeff;color:#2255aa}
.act-btn.primary{background:linear-gradient(135deg,#ff9d6c44,#ffcc5c44);border-color:#ffaa66}
.act-btn.primary:hover{background:linear-gradient(135deg,#ff9d6c88,#ffcc5c88);color:#884400}
.tabs{display:flex;gap:4px;flex-shrink:0}
.tab{padding:5px 12px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;border:1px solid transparent;border-bottom:none;background:#e8f4ff;color:#88aacc;font-weight:600}
.tab.active{background:#ffffff;border-color:#c8e0ff;color:#4488cc}
.tab-content{display:none;flex:1;min-height:0;flex-direction:column;gap:4px}
.tab-content.active{display:flex}
.monster-preview{display:flex;justify-content:center;padding:4px}
#save-indicator{font-size:11px;color:#88bbdd;margin-left:auto;opacity:0;transition:opacity 0.5s}
#item-tooltip{font-size:12px;color:#445566;line-height:1.6}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">← 返回</a>
  <h1>放置挂机战斗 RPG</h1>
  <span id="save-indicator">✅ 已存档</span>
</div>
<canvas id="battle-canvas"></canvas>

      <div class="stat-row"><span>ATK</span><span class="stat-val" id="ui-atk">30</span></div>
      <div class="stat-row"><span>DEF</span><span class="stat-val" id="ui-def">10</span></div>
      <div class="stat-row"><span>暴击</span><span class="stat-val" id="ui-crit">5%</span></div>
      <div class="stat-row"><span>暴伤</span><span class="stat-val" id="ui-critdmg">150%</span></div>
      <div class="stat-row"><span>闪避</span><span class="stat-val" id="ui-dodge">5%</span></div>
      <div class="stat-row"><span>命中</span><span class="stat-val" id="ui-hit">95%</span></div>
      <div class="stat-row"><span>元素攻</span><span class="stat-val" id="ui-eatk">0</span></div>
      <div class="stat-row"><span>元素防</span><span class="stat-val" id="ui-edef">0</span></div>
    </div>
  </div>
  <div id="center-panel">
    <div class="panel" style="flex-shrink:0">
      <div class="panel-title">关卡选择</div>
      <div class="stage-ctrl">
        <button class="stage-btn" id="prev-stage">◀</button>
        <span class="stage-name" id="stage-name">第1关</span>
        <button class="stage-btn" id="next-stage">▶</button>
      </div>
      <div style="font-size:10px;color:#666;text-align:center;margin-top:3px" id="stage-info">怪物HP:100 ATK:10 DEF:5</div>
    </div>
    <div class="panel" style="flex:1;min-height:0;display:flex;flex-direction:column">
      <div class="tabs">
        <div class="tab active" data-tab="chests">宝箱库存</div>
        <div class="tab" data-tab="inventory">装备背包</div>
      </div>
      <div id="tab-chests" class="tab-content active">
        <div class="chest-grid" id="chest-grid"></div>
        <div class="action-row" style="margin-top:auto;flex-shrink:0">
          <button class="act-btn primary" id="btn-open-selected">开启宝箱</button>
          <button class="act-btn primary" id="btn-open-all">一键开启</button>
        </div>
      </div>
      <div id="tab-inventory" class="tab-content">
        <div class="inv-grid" id="inv-grid"></div>
        <div class="action-row" style="margin-top:auto;flex-shrink:0">
          <button class="act-btn" id="btn-sell-all">变卖装备</button>
        </div>
      </div>
    </div>
  </div>
  <div id="right-panel" class="panel">
    <div class="panel-title">装备栏</div>
    <div class="equip-slots" id="equip-slots">
      <div class="equip-slot" data-slot="weapon"><div class="slot-name">武器</div><div class="item-name" id="eq-weapon">空</div></div>
      <div class="equip-slot" data-slot="helmet"><div class="slot-name">头盔</div><div class="item-name" id="eq-helmet">空</div></div>
      <div class="equip-slot" data-slot="armor"><div class="slot-name">护甲</div><div class="item-name" id="eq-armor">空</div></div>
      <div class="equip-slot" data-slot="gloves"><div class="slot-name">手套</div><div class="item-name" id="eq-gloves">空</div></div>
      <div class="equip-slot" data-slot="boots"><div class="slot-name">靴子</div><div class="item-name" id="eq-boots">空</div></div>
      <div class="equip-slot" data-slot="accessory"><div class="slot-name">饰品</div><div class="item-name" id="eq-accessory">空</div></div>
    </div>
    <div style="margin-top:6px;font-size:10px;color:#555">右键装备格可卸下</div>
    <div class="panel-title" style="margin-top:8px">物品提示</div>
    <div id="item-tooltip" style="font-size:10px;color:#aaa;line-height:1.5">点击背包中的装备以查看详情</div>
  </div>
</div>
<script>
// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    return this;
  };
}

// ===== CONSTANTS =====
const RARITIES = [
  {name:'普通',color:'#9e9e9e'},{name:'坚固',color:'#ffffff'},
  {name:'精良',color:'#4caf50'},{name:'稀有',color:'#2196f3'},
  {name:'史诗初级',color:'#00bcd4'},{name:'史诗',color:'#9c27b0'},
  {name:'史诗精英',color:'#673ab7'},{name:'传说',color:'#ff9800'},
  {name:'传说精英',color:'#ffd700'},{name:'远古',color:'#ffeb3b'},
  {name:'远古精英',color:'#ff5722'},{name:'神圣',color:'#f44336'},
  {name:'神圣精英',color:'#e91e63'},{name:'神器',color:'#ff4081'},
  {name:'神器精英',color:'#ff80ab'},{name:'混沌',color:'#ea00ff'},
  {name:'混沌精英',color:'#ff00ff'},{name:'虚空',color:'#00ffff'},
  {name:'虚空精英',color:'#40ffff'},{name:'深渊',color:'#00b0ff'},
  {name:'深渊精英',color:'#4040ff'},{name:'太古',color:'#3f51b5'},
  {name:'太古精英',color:'#7c3aed'},{name:'永恒',color:'#8b00ff'},
  {name:'永恒精英',color:'#9c00ff'},{name:'神话',color:'#b3d9ff'},
  {name:'神话精英',color:'#e0f0ff'},{name:'创世',color:'#ff6ec7'},
  {name:'创世精英',color:'#ffd700'},{name:'至尊',color:'#ffffff'}
];
const SLOTS = ['weapon','helmet','armor','gloves','boots','accessory'];
const SLOT_NAMES = {weapon:'武器',helmet:'头盔',armor:'护甲',gloves:'手套',boots:'靴子',accessory:'饰品'};
const SLOT_ICONS = {weapon:'⚔️',helmet:'⛑️',armor:'🛡️',gloves:'🧤',boots:'👢',accessory:'💍'};

// ===== 10种装备类别，决定名字+属性分布偏向 =====
// bias: 各属性加权系数（相对基础值的额外乘数叠加）
const ITEM_TYPES = [
  { name:'魔法棒',  slot:'weapon',    icon:'🪄', bias:{elemAtk:2.0, critDmg:0.5},
    desc:'元素攻击大幅提升，暴击伤害略低' },
  { name:'大剑',    slot:'weapon',    icon:'⚔️', bias:{atk:2.0, critRate:0.6},
    desc:'攻击力极高，暴击率略低' },
  { name:'匕首',    slot:'weapon',    icon:'🗡️', bias:{critRate:2.5, dodge:1.5, atk:0.6},
    desc:'暴击率与闪避超高，攻击力偏低' },
  { name:'龙鳞甲',  slot:'armor',     icon:'🐉', bias:{def:2.2, elemDef:1.5, hp:0.8},
    desc:'防御与元素防御极强' },
  { name:'皮甲',    slot:'armor',     icon:'🥋', bias:{hp:1.8, dodge:1.5, def:0.5},
    desc:'生命与闪避高，防御偏低' },
  { name:'龙角盔',  slot:'helmet',    icon:'🪖', bias:{def:1.8, hit:1.5, hp:0.7},
    desc:'防御命中兼顾' },
  { name:'法师帽',  slot:'helmet',    icon:'🎩', bias:{elemAtk:1.8, elemDef:1.5, critDmg:1.2},
    desc:'元素双属性优秀' },
  { name:'疾风靴',  slot:'boots',     icon:'👟', bias:{dodge:2.5, hit:1.5, def:0.3},
    desc:'闪避命中大幅提升' },
  { name:'力量手套',slot:'gloves',    icon:'🥊', bias:{atk:1.8, critRate:1.5, hit:0.8},
    desc:'攻击暴击强力组合' },
  { name:'龙晶项链',slot:'accessory', icon:'📿', bias:{hp:1.5, critDmg:2.0, elemAtk:1.2},
    desc:'全能属性，暴伤突出' },

// 30稀有度 × 10前缀（越高稀有度词汇越霸气）
const RARITY_PREFIXES = [
  // tier 0 普通
  ['破旧的','老旧的','磨损的','粗糙的','普通的','平凡的','简朴的','廉价的','寻常的','粗制的'],
  // tier 1 坚固
  ['坚硬的','厚实的','耐用的','粗犷的','结实的','稳固的','笨重的','朴实的','坚韧的','粗壮的'],
  // tier 2 精良
  ['精制的','优质的','细腻的','打磨的','精巧的','光滑的','工整的','精良的','细工的','匠心的'],
  // tier 3 稀有
  ['湛蓝的','稀有的','珍稀的','罕见的','幸运的','闪烁的','奇异的','独特的','特制的','专属的'],
  // tier 4 史诗初级
  ['史诗的','传奇的','英雄的','荣耀的','辉煌的','显赫的','卓越的','杰出的','非凡的','超凡的'],
  // tier 5 史诗
  ['炽热的','燃烧的','烈焰的','赤炎的','灼烧的','火焰的','炎炎的','烈火的','暗炎的','熔岩的'],
  // tier 6 史诗精英
  ['寒冰的','冰霜的','极寒的','凛冬的','冻结的','永冻的','极冰的','霜雪的','寒霜的','冰封的'],
  // tier 7 传说
  ['雷霆的','电闪的','闪电的','霹雳的','惊雷的','轰鸣的','雷神的','天雷的','电光的','雷电的'],
  // tier 8 传说精英
  ['黄金的','铂金的','纯金的','闪金的','熔金的','神金的','璀璨的','耀金的','皇金的','王者的'],
  // tier 9 远古
  ['远古的','上古的','太古的','亘古的','洪荒的','始古的','原古的','混沌的','蛮荒的','幽古的'],
  // tier 10 远古精英
  ['炎龙的','烈龙的','神龙的','龙啸的','龙裂的','焰龙的','冥龙的','暗龙的','战龙的','巨龙的'],
  // tier 11 神圣
  ['神圣的','圣洁的','圣光的','圣耀的','圣灵的','天圣的','光明的','圣焰的','圣化的','祈圣的'],
  // tier 12 神圣精英
  ['天堂的','天庭的','天界的','天神的','圣界的','天启的','天赋的','苍天的','天道的','天选的'],
  // tier 13 神器
  ['神器的','神圣器的','神兵的','神械的','神装的','神制的','神铸的','神工的','神造的','神赐的'],
  // tier 14 神器精英
  ['至神的','封神的','弑神的','破神的','逆神的','炼神的','融神的','归神的','化神的','凝神的'],
  // tier 15 混沌
  ['混沌的','虚无的','深渊的','黑暗的','腐化的','侵蚀的','扭曲的','污染的','腐蚀的','蚀骨的'],
  // tier 16 混沌精英
  ['噬魂的','夺魄的','摄魂的','灭魂的','焚魂的','碎魂的','凝魂的','炼魂的','渡魂的','吞魂的'],
  // tier 17 虚空
  ['虚空的','星空的','宇宙的','星际的','银河的','星河的','星辰的','宇宙的','星尘的','星芒的'],
  // tier 18 虚空精英
  ['时空的','维度的','次元的','异界的','跨界的','穿越的','折叠的','扭曲的','裂缝的','裂空的'],
  // tier 19 深渊
  ['深渊的','无底的','冥渊的','幽冥的','暗渊的','炼狱的','地狱的','幽暗的','深冥的','渊底的'],
  // tier 20 深渊精英
  ['冥王的','冥帝的','阎罗的','死神的','幽灵的','亡者的','冥灵的','死域的','冥界的','夺命的'],

  ['造化的','化生的','创化的','演化的','进化的','蜕化的','衍化的','圆化的','归元的','返本的'],

  ['创世的','开天的','辟地的','天地的','万物的','宇宙初的','始源的','元力的','本元的','原力的'],
  // tier 28 创世精英
  ['主宰的','统御的','掌控的','支配的','凌驾的','超越的','突破的','极限的','最强的','无敌的'],
  // tier 29 至尊
  ['至尊的','唯一的','绝对的','最终的','终极的','极尽的','无上至的','万古第一的','宇宙级的','神灵之'],

// ===== GAME STATE =====
let player = {
  level:1, exp:0, hp:500, maxHp:500,
  atk:30, def:10, critRate:5, critDmg:150,
  dodge:5, hit:95, elemAtk:0, elemDef:0,
  equipped:{weapon:null,helmet:null,armor:null,gloves:null,boots:null,accessory:null}
};
let inventory = []; // array of item objects
let chests = [];    // array of {tier, count}
let stage = 1;
let monster = null;
let selectedChestTier = -1;
let itemIdCounter = 1;

// ===== ITEM GENERATION =====
function rollItem(tierIndex) {
  const t = tierIndex;
  // Pick random item type
  const itype = ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
  // Pick random prefix from this tier
  const prefix = RARITY_PREFIXES[t][Math.floor(Math.random()*10)];
  const fullName = prefix + itype.name;

  // Base stat roller with type bias
  const r = (statKey, base, perTier) => {
    const biasMul = itype.bias[statKey] !== undefined ? itype.bias[statKey] : 1.0;
    const v = (base + t*perTier) * biasMul * (0.75 + Math.random()*0.5);
    return Math.round(v*10)/10;
  };

  return {
    id: itemIdCounter++,
    tier: tierIndex,
    slot: itype.slot,
    icon: itype.icon,
    typeName: itype.name,
    prefix,
    name: fullName,
    hp:       r('hp',       50,  80),
    atk:      r('atk',       5,  12),
    def:      r('def',       3,   8),
    critRate: r('critRate', 0.5, 0.3),
    critDmg:  r('critDmg',   5,   4),
    dodge:    r('dodge',    0.3, 0.25),
    hit:      r('hit',       1,  0.2),
    elemAtk:  r('elemAtk',   2,  10),
    elemDef:  r('elemDef',   2,   8),
  };
}

// ===== CHEST SYSTEM =====
function getChestDropWeights(chestTier) {
  // returns array of {tier, weight} for tiers chestTier-3 to chestTier
  const result = [];
  const weights = [50,40,30,10]; // tier-3, tier-2, tier-1, tier
  for(let i=0;i<4;i++){
    const t = chestTier - 3 + i;
    if(t>=0 && t<30) result.push({tier:t, weight:weights[i]});
  }
  return result;
}
function openChest(tier) {
  const drops = getChestDropWeights(tier);
  const total = drops.reduce((s,d)=>s+d.weight,0);
  let rand = Math.random()*total;
  let itemTier = drops[drops.length-1].tier;
  for(const d of drops){
    rand -= d.weight;
    if(rand<=0){itemTier=d.tier;break;}
  }
  return rollItem(itemTier);
}

// ===== PLAYER STATS (with equipment) =====
function getPlayerStats() {
  let s = {
    maxHp: player.maxHp, atk: player.atk, def: player.def,
    critRate: player.critRate, critDmg: player.critDmg,
    dodge: player.dodge, hit: player.hit,
    elemAtk: player.elemAtk, elemDef: player.elemDef
  };
  for(const slot of SLOTS) {
    const item = player.equipped[slot];
    if(item) {
      s.maxHp += item.hp; s.atk += item.atk; s.def += item.def;
      s.critRate += item.critRate; s.critDmg += item.critDmg;
      s.dodge += item.dodge; s.hit += item.hit;
      s.elemAtk += item.elemAtk; s.elemDef += item.elemDef;
    }
  }
  return s;
}

// ===== STAGE / MONSTER =====
function monsterStats(n) {
  return {
    maxHp: Math.round(100 * Math.pow(n,1.5)),
    atk:   Math.round(10  * Math.pow(n,1.2)),
    def:   5 * n
  };
}
function spawnMonster() {
  const ms = monsterStats(stage);
  monster = {hp: ms.maxHp, maxHp: ms.maxHp, atk: ms.atk, def: ms.def, dying:false, x:0, y:0};
}
function chestDropChance() {
  return Math.min(0.80, 0.30 + stage*0.02);
}
function minChestTier() {
  return Math.floor(stage * 29/20);
}

// ===== SELL =====
function sellExpForTier(t) {
  return Math.round(Math.pow(t,1.5)*50 + 100);
}
function sellItem(item) {
  const xp = sellExpForTier(item.tier);
  gainExp(xp);
  return xp;
}
function gainExp(xp) {
  player.exp += xp;
  while(player.exp >= player.level * 500 && player.level < 100) {
    player.exp -= player.level * 500;
    player.level++;
    player.maxHp += 50; player.hp = Math.min(player.hp+50, getPlayerStats().maxHp);
    player.atk += 5; player.def += 3;
    player.critRate = Math.min(player.critRate+0.1, 95);
    player.critDmg += 1; player.dodge = Math.min(player.dodge+0.05,80);
    player.hit = Math.min(player.hit+0.1,100);
    levelUpFlash();
  }
}

const canvas = document.getElementById('battle-canvas');
const ctx = canvas.getContext('2d');
let canvasW = 0, canvasH = 0;
function setupCanvas() {
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvasW = rect.width; canvasH = rect.height;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;

}

function initStars() {

let playerX=0, playerY=0;

// ===== DRAW FUNCTIONS =====
function drawBackground(t) {
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,canvasH*0.72);
  sky.addColorStop(0,'#6ec6f5');
  sky.addColorStop(0.6,'#b8e4ff');
  sky.addColorStop(1,'#dff2ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvasW,canvasH*0.72);

  // Distant hills (soft pastel)
  ctx.fillStyle = '#a8dda0';
  ctx.beginPath();
  ctx.moveTo(0, canvasH*0.72);
  for(let x=0;x<=canvasW;x+=20){
    const hy = canvasH*0.62 + Math.sin(x*0.015+1)*canvasH*0.05 + Math.sin(x*0.008)*canvasH*0.03;
    x===0 ? ctx.moveTo(x,hy) : ctx.lineTo(x,hy);
  }
  ctx.lineTo(canvasW,canvasH*0.72); ctx.lineTo(0,canvasH*0.72); ctx.closePath();
  ctx.fill();

  // Clouds
  for(const f of fogParticles) {
    f.x += f.speed * f.dir;
    if(f.x > canvasW+f.w) f.x = -f.w;
    ctx.save();
    ctx.globalAlpha = f.alpha;
    // fluffy cloud shape
    const cx=f.x, cy=f.y, cw=f.w, ch=f.h;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.ellipse(cx,cy,cw*0.5,ch*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-cw*0.22,cy+ch*0.1,cw*0.35,ch*0.38,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+cw*0.25,cy+ch*0.08,cw*0.32,ch*0.35,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx,cy+ch*0.18,cw*0.44,ch*0.32,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Candy orbs (floating sparkle)
  for(const o of orbs) {
    o.x += o.vx; o.y += o.vy + Math.sin(o.phase)*0.2;
    o.phase += 0.025;
    if(o.x<-20) o.x=canvasW+20; if(o.x>canvasW+20) o.x=-20;
    if(o.y<5) o.vy=Math.abs(o.vy); if(o.y>canvasH*0.68) o.vy=-Math.abs(o.vy);
    const pulse = 0.75 + 0.25*Math.sin(o.phase*1.5);
    ctx.save();
    ctx.globalAlpha = 0.55*pulse;
    ctx.shadowColor = o.color; ctx.shadowBlur = 10;
    ctx.fillStyle = o.color;
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r*pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  }

  // Sparkle confetti
  for(const s of stars) {
    const blink = 0.4 + 0.6*Math.abs(Math.sin(s.blink + t*0.0015));
    ctx.globalAlpha = blink;
    ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.arc(s.x*canvasW, s.y*canvasH, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Grass ground
  const grass = ctx.createLinearGradient(0,canvasH*0.72,0,canvasH);
  grass.addColorStop(0,'#7ec850');
  grass.addColorStop(0.18,'#6ab840');
  grass.addColorStop(1,'#4a9030');
  ctx.fillStyle = grass;
  ctx.fillRect(0, canvasH*0.72, canvasW, canvasH*0.28);

  // Grass highlight line
  ctx.strokeStyle = 'rgba(180,255,120,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,canvasH*0.72); ctx.lineTo(canvasW,canvasH*0.72); ctx.stroke();

  // Little flowers on ground
  const flowerX = [canvasW*0.1,canvasW*0.3,canvasW*0.55,canvasW*0.88];
  const flowerC = ['#ff88cc','#ffdd44','#ff99aa','#cc88ff'];
  for(let fi=0;fi<4;fi++){
    const fx=flowerX[fi], fy=canvasH*0.75;
    ctx.fillStyle='#228822';
    ctx.fillRect(fx-1,fy,2,6);
    ctx.fillStyle=flowerC[fi];
    ctx.beginPath(); ctx.arc(fx,fy,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff8aa';
    ctx.beginPath(); ctx.arc(fx,fy,1.5,0,Math.PI*2); ctx.fill();
  }
}

function drawPlayer(t) {
  const x = playerX, y = playerY;
  const ps = getPlayerStats();
  const hpPct = player.hp / ps.maxHp;
  const alive = playerDeadTimer <= 0;
  
  if(!alive) {
    // Death blink
    if(Math.floor(t/200)%2===0) return;
    ctx.globalAlpha = 0.4;
  }
  
  // Shadow
  ctx.save();
  ctx.globalAlpha *= 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x, y+28, 14, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  
  // Body - bright orange/white knight
  ctx.save();
  const bob = Math.sin(t*0.003)*2;

  // Legs
  ctx.fillStyle = '#e8a050';
  ctx.fillRect(x-7, y+8+bob, 6, 16);
  ctx.fillRect(x+1, y+8+bob, 6, 16);
  // Boots (brown)
  ctx.fillStyle = '#8b5e3c';
  ctx.fillRect(x-8, y+22+bob, 7, 6);
  ctx.fillRect(x+1, y+22+bob, 7, 6);
  // Body armor (warm white + orange trim)
  const bodyGrad = ctx.createLinearGradient(x-9, y-10, x+9, y+8);
  bodyGrad.addColorStop(0,'#fff8ee');
  bodyGrad.addColorStop(1,'#ffe0b0');
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(x-9, y-10+bob, 18, 20);
  // Orange trim lines
  ctx.strokeStyle = '#ff9944';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x-9, y-10+bob, 18, 20);
  // Shoulder pads (orange)
  ctx.fillStyle = '#ff8833';
  ctx.fillRect(x-12, y-10+bob, 6, 6);
  ctx.fillRect(x+6, y-10+bob, 6, 6);
  // Belt (golden)
  ctx.fillStyle = '#ffcc33';
  ctx.fillRect(x-9, y+8+bob, 18, 3);
  // Head (skin)
  const headGrad = ctx.createLinearGradient(x-7, y-22, x+7, y-8);
  headGrad.addColorStop(0,'#ffe0c0');
  headGrad.addColorStop(1,'#ffccaa');
  ctx.fillStyle = headGrad;
  ctx.fillRect(x-6, y-22+bob, 12, 14);
  // Helmet (white with orange visor)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x-7, y-24+bob, 14, 8);
  ctx.fillRect(x-5, y-26+bob, 10, 4);
  ctx.fillStyle = '#ff9944';
  ctx.fillRect(x-7, y-18+bob, 14, 3); // visor strip
  // Eyes (dark)
  ctx.fillStyle = '#443322';
  ctx.fillRect(x-4, y-17+bob, 3, 3);
  ctx.fillRect(x+1, y-17+bob, 3, 3);
  // Smile
  ctx.strokeStyle = '#775533'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x, y-12+bob, 3, 0.1, Math.PI-0.1); ctx.stroke();
  // Sword (arm extends right)
  const swingAnim = playerAtkTimer > 0 ? Math.sin((1.5-playerAtkTimer/1500)*Math.PI)*20 : 0;
  ctx.save();
  ctx.translate(x+10, y-5+bob);
  ctx.rotate((swingAnim)*Math.PI/180);
  // Sword handle (brown)
  ctx.fillStyle = '#8b5e3c';
  ctx.fillRect(0, 0, 4, 14);
  // Guard (golden)
  ctx.fillStyle = '#ffcc33';
  ctx.fillRect(-4, 3, 12, 4);
  // Blade
  const bladeColor = player.equipped.weapon ? RARITIES[player.equipped.weapon.tier].color : '#c8e8ff';
  const bladeGrad = ctx.createLinearGradient(0,0,4,-22);
  bladeGrad.addColorStop(0, bladeColor+'cc');
  bladeGrad.addColorStop(1, '#ffffff');
  ctx.fillStyle = bladeGrad;
  ctx.beginPath();
  ctx.moveTo(0,-2); ctx.lineTo(4,-2); ctx.lineTo(2,-24); ctx.closePath();
  ctx.fill();
  // Blade glow (keep for equipped)
  if(player.equipped.weapon) {
    ctx.shadowColor = bladeColor;
    ctx.shadowBlur = 10;
    ctx.strokeStyle = bladeColor+'88'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,-2); ctx.lineTo(4,-2); ctx.lineTo(2,-24); ctx.closePath(); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
  
  ctx.globalAlpha = 1;
  ctx.restore();
  
  // HP bar
  drawHpBar(x-25, y-30+bob, 50, 6, hpPct, '#22cc44', '#cc2222');
}

function drawMonster(t) {
  if(!monster) return;
  const x = monsterX, y = monsterY;
  const hpPct = monster.hp / monster.maxHp;
  
  // Monster tier color based on stage
  const tierIdx = Math.min(stage-1, 29);
  const tColor = RARITIES[tierIdx].color;
  
  // Shadow
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#226600';
  ctx.beginPath();
  ctx.ellipse(x, y+28, 18, 5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  const bob = Math.sin(t*0.004+1)*3; // slime bounces more
  ctx.save();

  // Rarity glow aura (candy color)
  if(tierIdx >= 5) {
    const aura = ctx.createRadialGradient(x, y, 0, x, y, 36);
    aura.addColorStop(0, tColor+'44');
    aura.addColorStop(1, 'transparent');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(x, y, 46, 0, Math.PI*2); ctx.fill();
  }

  const armSwing = monsterAtkTimer > 0 ? Math.sin((2-monsterAtkTimer/2000)*Math.PI)*25 : 0;

  if(tierIdx < 8) {
    // === SLIME (stages 1-8) ===
    // Tiny nub arms
    ctx.fillStyle = '#55cc44';
    ctx.save(); ctx.translate(x-18, y+5+bob); ctx.rotate(-armSwing*Math.PI/180);
    ctx.beginPath(); ctx.ellipse(0,0,7,5,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.translate(x+18, y+5+bob); ctx.rotate(armSwing*Math.PI/180);
    ctx.beginPath(); ctx.ellipse(0,0,7,5,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    // Body blob
    const slimeGrad = ctx.createRadialGradient(x-6, y-8, 2, x, y, 22);
    slimeGrad.addColorStop(0, '#aaffaa');
    slimeGrad.addColorStop(0.5, '#55dd44');
    slimeGrad.addColorStop(1, '#33aa22');
    ctx.fillStyle = slimeGrad;
    ctx.beginPath();
    ctx.ellipse(x, y+bob, 20, 22, 0, 0, Math.PI*2); ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.ellipse(x-6, y-8+bob, 7, 5, -0.4, 0, Math.PI*2); ctx.fill();
    // Eyes (big cute)
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(x-7,y-4+bob,5,6,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+7,y-4+bob,5,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=tColor; ctx.shadowColor=tColor; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.ellipse(x-6,y-4+bob,3,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+8,y-4+bob,3,4,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x-6,y-4+bob,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+8,y-4+bob,1.5,0,Math.PI*2); ctx.fill();
    // Smile
    ctx.strokeStyle='#226600'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x,y+6+bob,6,0.2,Math.PI-0.2); ctx.stroke();
    // Crown for high-tier slime
    if(tierIdx>=5){ ctx.fillStyle=tColor; ctx.shadowColor=tColor; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.moveTo(x-8,y-18+bob); ctx.lineTo(x-6,y-26+bob); ctx.lineTo(x,y-20+bob);
      ctx.lineTo(x+6,y-26+bob); ctx.lineTo(x+8,y-18+bob); ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; }
  } else {
    // === MUSHROOM BOSS (stages 9-20) ===
    // Stem/legs
    ctx.fillStyle = '#e8c898';
    ctx.beginPath(); ctx.roundRect(x-10, y+2+bob, 20, 22, 3); ctx.fill();
    // Arms
    ctx.fillStyle = '#ddb870';
    ctx.save(); ctx.translate(x-14, y+4+bob); ctx.rotate(-armSwing*Math.PI/180);
    ctx.fillRect(-6,0,8,14); ctx.restore();
    ctx.save(); ctx.translate(x+14, y+4+bob); ctx.rotate(armSwing*Math.PI/180);
    ctx.fillRect(-2,0,8,14); ctx.restore();
    // Cap (big colorful mushroom hat)
    const capGrad = ctx.createRadialGradient(x-5, y-20, 2, x, y-12, 26);
    capGrad.addColorStop(0, tColor+'ff');
    capGrad.addColorStop(0.6, tColor+'cc');
    capGrad.addColorStop(1, tColor+'44');
    ctx.fillStyle = capGrad;
    ctx.shadowColor = tColor; ctx.shadowBlur = tierIdx>=15 ? 16 : 6;
    ctx.beginPath(); ctx.ellipse(x, y-14+bob, 26, 18, 0, Math.PI, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // White spots on cap
    ctx.fillStyle='rgba(255,255,255,0.8)';
    [[x-10,y-20],[x+8,y-22],[x,y-14]].forEach(([sx,sy])=>{
      ctx.beginPath(); ctx.arc(sx,sy+bob,3,0,Math.PI*2); ctx.fill();
    });
    // Cap underside
    ctx.fillStyle='#fff8ee';
    ctx.beginPath(); ctx.ellipse(x, y-5+bob, 24, 8, 0, 0, Math.PI); ctx.fill();
    // Face
    ctx.fillStyle='#443322';
    ctx.beginPath(); ctx.ellipse(x-7,y+6+bob,4,5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+7,y+6+bob,4,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=tColor; ctx.shadowColor=tColor; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(x-7,y+6+bob,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+7,y+6+bob,2.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Grumpy mouth
    ctx.strokeStyle='#443322'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x,y+14+bob,5,Math.PI+0.3,-0.3); ctx.stroke();
  }

  // HP bar
  ctx.restore();
  drawHpBar(x-30, y-48+bob, 60, 7, hpPct, '#44cc44', '#cc4422');
}

function drawHpBar(x, y, w, h, pct, colorFull, colorLow) {
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 3); ctx.fill();
  const c = pct>0.5 ? colorFull : pct>0.25 ? '#ffaa00' : colorLow;
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.roundRect(x+1, y+1, Math.max(0,(w-2)*pct), h-2, 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 3); ctx.stroke();
}

// ===== SLASH EFFECTS =====
function spawnSlash(fromX, fromY, toX, toY, color) {
  slashEffects.push({
    x1:fromX, y1:fromY, x2:toX, y2:toY,
    color, alpha:1, life:0.35, maxLife:0.35,
    particles:[]
  });
  // Slash particles
  for(let i=0;i<8;i++) {
    const t = i/8;
    const px = fromX + (toX-fromX)*t + (Math.random()-0.5)*20;
    const py = fromY + (toY-fromY)*t + (Math.random()-0.5)*20;
    particles.push({x:px,y:py,vx:(Math.random()-0.5)*3,vy:-1-Math.random()*2,alpha:1,life:0.4,maxLife:0.4,color,r:3+Math.random()*3});
  }
}

function drawSlashEffects(dt) {
  for(let i=slashEffects.length-1;i>=0;i--) {
    const s = slashEffects[i];
    s.life -= dt;
    if(s.life<=0){slashEffects.splice(i,1);continue;}
    const pct = s.life/s.maxLife;
    
    ctx.save();
    ctx.globalAlpha = pct;
    // Glow
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 4*pct;
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 1.5*pct;
    ctx.strokeStyle = '#ffffff';
    ctx.stroke();
    ctx.restore();
  }
}

// ===== DAMAGE NUMBERS =====
function spawnDamageNumber(x, y, value, isCrit, isPlayer) {
  damageNumbers.push({
    x, y: y-10, value, isCrit, isPlayer,
    vy: -2-Math.random(), vx: (Math.random()-0.5)*1.5,
    alpha: 1, life: isCrit?1.0:0.7, maxLife: isCrit?1.0:0.7
  });
}
function drawDamageNumbers(dt) {
  for(let i=damageNumbers.length-1;i>=0;i--) {
    const d = damageNumbers[i];
    d.life -= dt;
    if(d.life<=0){damageNumbers.splice(i,1);continue;}
    d.x += d.vx; d.y += d.vy; d.vy *= 0.95;
    const pct = d.life/d.maxLife;
    ctx.save();
    ctx.globalAlpha = pct;
    if(d.isCrit) {
      ctx.font = `bold ${18+Math.round((1-pct)*4)}px Arial`;
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ff8800';
      ctx.shadowBlur = 10;
    } else {
      ctx.font = d.isPlayer ? 'bold 13px Arial' : '11px Arial';
      ctx.fillStyle = d.isPlayer ? '#ff4455' : '#228833';
      ctx.shadowColor = d.isPlayer ? '#ff8888' : '#aaffaa';
      ctx.shadowBlur = 5;
    }
    ctx.textAlign = 'center';
    ctx.fillText((d.isCrit?'暴击! ':'') + Math.round(d.value), d.x, d.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ===== LIGHT BEAMS =====
function spawnLightBeam(x, color) {
  lightBeams.push({x, color, alpha:1, life:1.5, maxLife:1.5, width:24});
}
function drawLightBeams(dt) {
  for(let i=lightBeams.length-1;i>=0;i--) {
    const b = lightBeams[i];
    b.life -= dt;
    if(b.life<=0){lightBeams.splice(i,1);continue;}
    const pct = b.life/b.maxLife;
    ctx.save();
    ctx.globalAlpha = pct*0.9;
    const beamGrad = ctx.createLinearGradient(b.x-b.width/2, 0, b.x+b.width/2, 0);
    beamGrad.addColorStop(0,'transparent');
    beamGrad.addColorStop(0.5, b.color+'ff');
    beamGrad.addColorStop(1,'transparent');
    ctx.fillStyle = beamGrad;
    ctx.fillRect(b.x - b.width/2, 0, b.width, canvasH);
    // Sparkles at top
    ctx.globalAlpha = pct;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff';
    for(let j=0;j<5;j++) {
      const sx = b.x + (Math.random()-0.5)*30;
      const sy = Math.random()*canvasH*0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, 2+Math.random()*3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ===== PARTICLES =====
function drawParticles(dt) {
  for(let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.life -= dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x += p.vx; p.y += p.vy; p.vy += 0.05;
    const pct = p.life/p.maxLife;
    ctx.save();
    ctx.globalAlpha = pct;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*pct, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ===== SCREEN FLASH =====
function levelUpFlash() {
  screenFlash = {alpha:0.45, color:'#ffffaa'};
}
function deathFlash() {
  screenFlash = {alpha:0.35, color:'#ffcccc'};
}
function rareDropFlash(color) {
  screenFlash = {alpha:0.4, color};
}
function drawScreenFlash(dt) {
  if(screenFlash.alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = screenFlash.alpha;
  ctx.fillStyle = screenFlash.color;
  ctx.fillRect(0,0,canvasW,canvasH);
  ctx.restore();
  screenFlash.alpha -= dt*1.5;
  if(screenFlash.alpha<0) screenFlash.alpha=0;
}

// ===== VIGNETTE (soft warm border) =====
function drawVignette() {
  const vg = ctx.createRadialGradient(canvasW/2,canvasH/2,canvasH*0.35,canvasW/2,canvasH/2,canvasH*0.95);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(100,160,80,0.12)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,canvasW,canvasH);
}

// ===== BATTLE LOGIC =====
let lastTime = 0;
function battleTick(dt) {
  if(!monster) { spawnMonster(); return; }
  
  // Player attacks
  playerAtkTimer -= dt;
  if(playerAtkTimer <= 0) {
    playerAtkTimer = 1.5;
    doPlayerAttack();
  }
  
  // Monster attacks
  monsterAtkTimer -= dt;
  if(monsterAtkTimer <= 0) {
    monsterAtkTimer = 2.0;
    doMonsterAttack();
  }
}

function doPlayerAttack() {
  const ps = getPlayerStats();
  // Dodge check for monster (monsters have no dodge)
  const isCrit = Math.random() < ps.critRate/100;
  let dmg = (ps.atk - monster.def*0.5) * (1 + Math.random()*0.2);
  if(isCrit) dmg *= (ps.critDmg/100);
  dmg = Math.max(1, Math.round(dmg));
  monster.hp -= dmg;
  
  // Slash effect
  const wColor = player.equipped.weapon ? RARITIES[player.equipped.weapon.tier].color : '#8888ff';
  spawnSlash(playerX+15, playerY-5, monsterX-15, monsterY, wColor);
  spawnDamageNumber(monsterX, monsterY-20, dmg, isCrit, false);
  
  if(monster.hp <= 0) {
    monster.hp = 0;
    // Kill: restore player to full HP
    player.hp = getPlayerStats().maxHp;
    spawnDamageNumber(playerX, playerY-38, '满血复活!', false, false);
    onMonsterDeath();
  }
}

function doMonsterAttack() {
  if(!monster) return;
  const ps = getPlayerStats();
  // Dodge check
  if(Math.random() < ps.dodge/100) {
    spawnDamageNumber(playerX, playerY-20, '闪避', false, false);
    return;
  }
  let dmg = (monster.atk - ps.def*0.5) * (1 + Math.random()*0.2);
  dmg = Math.max(1, Math.round(dmg));
  player.hp -= dmg;
  spawnDamageNumber(playerX, playerY-20, dmg, false, true);
  
  if(player.hp <= 0) {
    // Instant respawn: restore player and reset monster to full HP
    player.hp = getPlayerStats().maxHp;
    monster.hp = monster.maxHp;
    playerAtkTimer = 1.5;
    monsterAtkTimer = 2.0;
    deathFlash();
    spawnDamageNumber(playerX, playerY-38, '复活!', false, false);
  }
}

function onMonsterDeath() {
  // XP gain
  const xpGain = Math.round(10 * stage * (0.9+Math.random()*0.2));
  gainExp(xpGain);
  spawnDamageNumber(monsterX, monsterY-40, '+'+xpGain+' XP', false, false);
  
  // Death particles
  for(let i=0;i<15;i++) {
    particles.push({
      x:monsterX+(Math.random()-0.5)*30,
      y:monsterY+(Math.random()-0.5)*20,
      vx:(Math.random()-0.5)*5, vy:-3-Math.random()*3,
      alpha:1, life:0.6, maxLife:0.6,
      color: RARITIES[Math.min(stage-1,29)].color,
      r:4+Math.random()*5
    });
  }
  
  // Chest drop
  if(Math.random() < chestDropChance()) {
    const tier = minChestTier() + Math.floor(Math.random()*3);
    const actualTier = Math.min(29, tier);
    dropChest(actualTier, monsterX);
  }
  
  monster = null;
  setTimeout(()=>spawnMonster(), 600);
}

function dropChest(tier, x) {
  if(chests.length >= 99) return; // discard if full
  chests.push({tier, id: itemIdCounter++});
  spawnLightBeam(x, RARITIES[tier].color);
  if(tier >= 15) rareDropFlash(RARITIES[tier].color);
  renderChestGrid();
}

// ===== MAIN LOOP =====
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime)/1000, 0.1);
  lastTime = ts;
  animFrame++;
  
  setupCanvas();
  
  // Set positions
  playerX = canvasW * 0.2;
  monsterX = canvasW * 0.75;
  playerY = canvasH * 0.72;
  monsterY = canvasH * 0.72;
  
  // Update battle
  battleTick(dt);
  tickSave(dt);

  // Draw
  drawBackground(ts);
  drawLightBeams(dt);
  drawPlayer(ts);
  if(monster) drawMonster(ts);
  drawSlashEffects(dt);
  drawParticles(dt);
  drawDamageNumbers(dt);
  drawVignette();
  drawScreenFlash(dt);
  
  // Update UI periodically
  if(animFrame % 6 === 0) updateUI();
}

// ===== UI UPDATES =====
function updateUI() {
  const ps = getPlayerStats();
  document.getElementById('ui-level').textContent = player.level;
  document.getElementById('ui-hp').textContent = Math.round(player.hp) + '/' + Math.round(ps.maxHp);
  document.getElementById('ui-atk').textContent = Math.round(ps.atk);
  document.getElementById('ui-def').textContent = Math.round(ps.def);
  document.getElementById('ui-crit').textContent = ps.critRate.toFixed(1) + '%';
  document.getElementById('ui-critdmg').textContent = ps.critDmg.toFixed(0) + '%';
  document.getElementById('ui-dodge').textContent = ps.dodge.toFixed(1) + '%';
  document.getElementById('ui-hit').textContent = ps.hit.toFixed(1) + '%';
  document.getElementById('ui-eatk').textContent = Math.round(ps.elemAtk);
  document.getElementById('ui-edef').textContent = Math.round(ps.elemDef);
  
  const expNeeded = player.level * 500;
  document.getElementById('ui-exp').textContent = Math.round(player.exp) + '/' + expNeeded;
  document.getElementById('exp-bar').style.width = (player.exp/expNeeded*100).toFixed(1)+'%';
  
  document.getElementById('stage-name').textContent = '第'+stage+'关';
  const ms = monsterStats(stage);
  document.getElementById('stage-info').textContent = 
    '怪物HP:'+ms.maxHp+' ATK:'+ms.atk+' DEF:'+ms.def+' 宝箱概率:'+(chestDropChance()*100).toFixed(0)+'%';
  
  renderEquipSlots();
}

function renderEquipSlots() {
  for(const slot of SLOTS) {
    const item = player.equipped[slot];
    const el = document.getElementById('eq-'+slot);
    const slotEl = el.closest('.equip-slot');
    if(item) {
      const r = RARITIES[item.tier];
      const icon = item.icon || SLOT_ICONS[item.slot];
      el.innerHTML = `<span style="font-size:15px">${icon}</span><span style="font-size:11px;font-weight:700;word-break:break-all">${item.name}</span>`;
      el.style.color = r.color;
      slotEl.style.borderColor = r.color+'88';
      slotEl.style.boxShadow = `0 0 8px ${r.color}66, inset 0 0 8px ${r.color}22`;
      slotEl.style.animation = item.tier >= 20 ? 'equip-pulse 1.5s ease-in-out infinite' : '';
    } else {
      el.innerHTML = '<span style="font-size:18px">＋</span>';
      el.style.color = '#aabbcc';
      slotEl.style.borderColor = '#c8e0ff';
      slotEl.style.boxShadow = '';
      slotEl.style.animation = '';
    }
  }
}

function renderChestGrid() {
  const grid = document.getElementById('chest-grid');
  grid.innerHTML = '';
  // Group by tier
  const tierMap = {};
  for(const c of chests) {
    if(!tierMap[c.tier]) tierMap[c.tier] = 0;
    tierMap[c.tier]++;
  }
  const tiers = Object.keys(tierMap).map(Number).sort((a,b)=>b-a);
  for(const t of tiers) {
    const div = document.createElement('div');
    div.className = 'chest-item' + (selectedChestTier===t?' selected':'');
    div.title = RARITIES[t].name + '宝箱 x' + tierMap[t];
    const r = RARITIES[t];
    div.style.background = `radial-gradient(circle, ${r.color}33, ${r.color}11)`;
    div.style.borderColor = r.color+'88';
    div.style.boxShadow = `0 0 6px ${r.color}66`;
    div.innerHTML = `<span style="font-size:16px">🎁</span><div class="badge">${tierMap[t]}</div>`;
    div.addEventListener('click', ()=>{
      selectedChestTier = (selectedChestTier===t) ? -1 : t;
      renderChestGrid();
    });
    grid.appendChild(div);
  }
}

function renderInventoryGrid() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  for(const item of inventory) {
    const r = RARITIES[item.tier];
    const div = document.createElement('div');
    div.className = 'inv-item';
    div.style.background = `radial-gradient(circle, ${r.color}22, ${r.color}08)`;
    div.style.borderColor = r.color+'88';
    div.style.boxShadow = `0 0 ${4+item.tier}px ${r.color}${item.tier>=20?'cc':'66'}`;
    div.style.color = r.color;
    div.title = formatItemTooltip(item);
    const icon = item.icon || SLOT_ICONS[item.slot];
    div.innerHTML = `<div style="line-height:1.2;text-align:center"><div style="font-size:16px">${icon}</div><div style="font-size:10px;font-weight:600;word-break:break-all">${item.name}</div></div>`;
    div.addEventListener('click', ()=>clickInvItem(item));
    div.addEventListener('contextmenu', (e)=>{e.preventDefault();showItemTooltip(item);});
    grid.appendChild(div);
  }
}

function formatItemTooltip(item) {
  const r = RARITIES[item.tier];
  const itype = ITEM_TYPES.find(it=>it.name===item.typeName);
  return `[${r.name}] ${item.name}\n部位: ${SLOT_NAMES[item.slot]}\n` +
    (itype ? itype.desc+'\n' : '') +
    `HP+${item.hp.toFixed(0)} ATK+${item.atk.toFixed(0)} DEF+${item.def.toFixed(0)}\n` +
    `暴击+${item.critRate.toFixed(1)}% 暴伤+${item.critDmg.toFixed(0)}%\n` +
    `闪避+${item.dodge.toFixed(1)}% 命中+${item.hit.toFixed(1)}%\n` +
    `元攻+${item.elemAtk.toFixed(0)} 元防+${item.elemDef.toFixed(0)}`;
}

function showItemTooltip(item) {
  const r = RARITIES[item.tier];
  const itype = ITEM_TYPES.find(it=>it.name===item.typeName);
  const tt = document.getElementById('item-tooltip');
  tt.innerHTML =
    `<b style="color:${r.color};font-size:13px">${item.name}</b><br>` +
    `<span style="color:#7799bb;font-size:11px">[${r.name}] ${SLOT_NAMES[item.slot]}</span><br>` +
    (itype ? `<span style="color:#99aacc;font-size:11px;font-style:italic">${itype.desc}</span><br>` : '') +
    `<span style="color:#445566">❤️ HP <b>+${item.hp.toFixed(0)}</b> &nbsp;⚔️ ATK <b>+${item.atk.toFixed(0)}</b> &nbsp;🛡️ DEF <b>+${item.def.toFixed(0)}</b></span><br>` +
    `<span style="color:#445566">💥 暴击 <b>+${item.critRate.toFixed(1)}%</b> &nbsp;💫 暴伤 <b>+${item.critDmg.toFixed(0)}%</b></span><br>` +
    `<span style="color:#445566">💨 闪避 <b>+${item.dodge.toFixed(1)}%</b> &nbsp;🎯 命中 <b>+${item.hit.toFixed(1)}%</b></span><br>` +
    `<span style="color:#445566">✨ 元攻 <b>+${item.elemAtk.toFixed(0)}</b> &nbsp;🔮 元防 <b>+${item.elemDef.toFixed(0)}</b></span><br>` +
    `<span style="color:#ffaa44;font-size:11px">💰 变卖: ${sellExpForTier(item.tier)} EXP &nbsp;|&nbsp; 点击装备</span>`;
}

function clickInvItem(item) {
  showItemTooltip(item);
  // Equip it
  const prev = player.equipped[item.slot];
  if(prev) {
    // Put previous back
    inventory.push(prev);
  }
  player.equipped[item.slot] = item;
  inventory = inventory.filter(i=>i!==item);
  renderInventoryGrid();
  renderEquipSlots();
  saveGame();
}

// ===== ACTION BUTTONS =====
document.getElementById('btn-open-selected').addEventListener('click', ()=>{
  if(selectedChestTier < 0) return;
  const idx = chests.findIndex(c=>c.tier===selectedChestTier);
  if(idx < 0) return;
  chests.splice(idx,1);
  const item = openChest(selectedChestTier);
  inventory.push(item);
  // Rare drop flash
  if(item.tier >= 15) rareDropFlash(RARITIES[item.tier].color);
  if(chests.findIndex(c=>c.tier===selectedChestTier)<0) selectedChestTier=-1;
  renderChestGrid();
  renderInventoryGrid();
  switchTab('inventory');
  saveGame();
});

document.getElementById('btn-open-all').addEventListener('click', ()=>{
  const all = [...chests];
  chests = [];
  selectedChestTier = -1;
  let highestTier = -1;
  for(const c of all) {
    const item = openChest(c.tier);
    inventory.push(item);
    if(item.tier > highestTier) highestTier = item.tier;
  }
  if(highestTier >= 15) rareDropFlash(RARITIES[highestTier].color);
  renderChestGrid();
  renderInventoryGrid();
  switchTab('inventory');
  saveGame();
});

document.getElementById('btn-sell-all').addEventListener('click', ()=>{
  let totalXp = 0;
  for(const item of inventory) {
    totalXp += sellExpForTier(item.tier);
  }
  inventory = [];
  gainExp(totalXp);
  renderInventoryGrid();
  updateUI();
  saveGame();
});

// Stage controls
document.getElementById('prev-stage').addEventListener('click', ()=>{
  if(stage > 1) { stage--; spawnMonster(); updateUI(); saveGame(); }
});
document.getElementById('next-stage').addEventListener('click', ()=>{
  if(stage < 20) { stage++; spawnMonster(); updateUI(); saveGame(); }
});

// Equip slot right-click to unequip
document.querySelectorAll('.equip-slot').forEach(el=>{
  el.addEventListener('contextmenu', e=>{
    e.preventDefault();
    const slot = el.dataset.slot;
    const item = player.equipped[slot];
    if(item) {
      player.equipped[slot] = null;
      inventory.push(item);
      renderInventoryGrid();
      renderEquipSlots();
      saveGame();
    }
  });
  el.addEventListener('click', ()=>{
    const slot = el.dataset.slot;
    const item = player.equipped[slot];
    if(item) showItemTooltip(item);
  });
});

// Tabs
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.tab-content').forEach(tc=>{
    tc.classList.toggle('active', tc.id==='tab-'+name);
  });
}
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>switchTab(t.dataset.tab));
});

// ===== ANIMATED CSS KEYFRAMES (injected) =====
const style = document.createElement('style');
style.textContent = `
@keyframes equip-pulse {
  0%,100% { box-shadow: 0 0 8px currentColor, inset 0 0 8px currentColor; }
  50%      { box-shadow: 0 0 20px currentColor, inset 0 0 15px currentColor; }
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.tier-prismatic {
  background: linear-gradient(90deg, #ff6ec7, #ffd700, #00ffff, #ff6ec7) !important;
  background-size: 200% 100% !important;
  animation: shimmer 2s linear infinite !important;
}
`;
document.head.appendChild(style);

// ===== SAVE / LOAD =====
const SAVE_KEY = 'idleBattleSave_v1';
let saveTimer = 0;

function saveGame() {
  const data = {
    player: {
      level: player.level, exp: player.exp,
      hp: player.hp, maxHp: player.maxHp,
      atk: player.atk, def: player.def,
      critRate: player.critRate, critDmg: player.critDmg,
      dodge: player.dodge, hit: player.hit,
      elemAtk: player.elemAtk, elemDef: player.elemDef,
      equipped: player.equipped
    },
    inventory,
    chests,
    stage,
    itemIdCounter
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  // Flash the indicator
  const ind = document.getElementById('save-indicator');
  ind.style.opacity = '1';
  clearTimeout(ind._fadeTimer);
  ind._fadeTimer = setTimeout(()=>{ ind.style.opacity='0'; }, 1800);
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return false;
  try {
    const d = JSON.parse(raw);
    Object.assign(player, d.player);
    inventory = d.inventory || [];
    chests = d.chests || [];
    stage = d.stage || 1;
    itemIdCounter = d.itemIdCounter || 1;
    return true;
  } catch(e) { return false; }
}

// Auto-save every 30 seconds via game loop
function tickSave(dt) {
  saveTimer += dt;
  if(saveTimer >= 30) { saveTimer = 0; saveGame(); }
}

// ===== CANVAS HEIGHT =====
function setCanvasHeight() {
  const vh = window.innerHeight;
  const topbarH = document.getElementById('topbar').offsetHeight;
  const h = Math.floor((vh - topbarH) * 0.32);
  canvas.style.height = h + 'px';
  canvas.style.width = '100%';
}
window.addEventListener('resize', ()=>{ setCanvasHeight(); setupCanvas(); initStars(); });

// ===== INIT =====
function init() {
  setCanvasHeight();
  setupCanvas();
  initStars();

  const hasSave = loadGame();
  if(!hasSave) {
    // First time: give 5 starter chests
    for(let i=0;i<5;i++) chests.push({tier:Math.floor(Math.random()*4), id:itemIdCounter++});
  }

  spawnMonster();
  player.hp = getPlayerStats().maxHp;
  playerAtkTimer = 1.5;
  monsterAtkTimer = 2.0;

  renderChestGrid();
  renderInventoryGrid();
  updateUI();
  
  requestAnimationFrame(ts=>{
    lastTime = ts;
    requestAnimationFrame(gameLoop);
  });
}

init();
</script>
