<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十合</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
      flex-shrink: 0;
      gap: 12px;
    }

    .back-btn {
      color: #a0aec0;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 6px 12px;
      border: 1px solid #4a5568;
      border-radius: 8px;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: #fff; border-color: #fff; }

    .game-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #e2e8f0;
      white-space: nowrap;
    }

    .topbar-stats {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .stat-chip {
      font-size: 0.82rem;
      padding: 5px 12px;
      border-radius: 16px;
      background: #2d2d4e;
      color: #a0aec0;
      white-space: nowrap;
    }
    .stat-chip strong { color: #e2e8f0; }

    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 0.75rem;
      color: #718096;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 3px;
      border: 1.5px solid;
    }
    .legend-dot.open     { background: #2d4a6e; border-color: #5b8fc9; }
    .legend-dot.hidden   { background: #0d0d1a; border-color: #1a1a30; }
    .legend-dot.target   { background: #5a1a1a; border-color: #f87171; }

    .board-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px;
      position: relative;
    }

    #board-canvas {
      touch-action: none;
      cursor: default;
      border-radius: 6px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.6);
    }

    /* ── Modals ── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .modal.hidden { display: none; }

    .modal-box {
      background: #1a1a2e;
      border: 1px solid #4a5568;
      border-radius: 20px;
      padding: 36px 44px;
      text-align: center;
      box-shadow: 0 20px 64px rgba(0,0,0,0.6);
      width: 100%;
      max-width: 400px;
    }

    .modal-box h2 { font-size: 1.9rem; margin-bottom: 8px; }
    .modal-box .sub { color: #718096; font-size: 0.88rem; margin-bottom: 20px; line-height: 1.6; }

    .rules-list {
      text-align: left;
      background: #12122a;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      line-height: 1.8;
      color: #a0aec0;
    }
    .rules-list li { list-style: none; padding-left: 0; }
    .rules-list li::before { content: '• '; color: #667eea; }

    .stats-grid {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .stat-box {
      background: #12122a;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      padding: 12px 20px;
      min-width: 90px;
    }
    .stat-box .label { font-size: 0.75rem; color: #718096; margin-bottom: 4px; }
    .stat-box .value { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; }

    .btn-primary {
      padding: 13px 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="../index.html" class="back-btn">← 返回</a>
  <span class="game-title">十合</span>
  <div class="topbar-stats">
    <div class="stat-chip">翻开 <strong id="stat-rev">9</strong> / <strong id="stat-total">1024</strong></div>
    <div class="stat-chip">合并 <strong id="stat-merge">0</strong></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot open"></div>可拖动</div>
    <div class="legend-item"><div class="legend-dot hidden"></div>未翻开</div>
    <div class="legend-item"><div class="legend-dot target"></div>可合并</div>
  </div>
</nav>

<div class="board-area" id="board-area">
  <canvas id="board-canvas"></canvas>
</div>

<!-- Start modal -->
<div id="start-modal" class="modal">
  <div class="modal-box">
    <h2>✨ 十合</h2>
    <p class="sub">凑成 10，翻开世界</p>
    <ul class="rules-list">
      <li>32×32 方块棋盘，中心 3×3 已翻开</li>
      <li>所有翻开的数字都可以拖动</li>
      <li>拖到任意另一个数字上，两数之和为 <strong style="color:#6ee7b7">10</strong> 则合并</li>
      <li>合并：两个数字都消失，翻开目标的周围方块</li>
      <li>全部翻开 → 胜利；无法凑 10 → 失败</li>
    </ul>
    <button class="btn-primary" onclick="startGame()">开始游戏</button>
  </div>
</div>

<!-- Win modal -->
<div id="win-modal" class="modal hidden">
  <div class="modal-box">
    <h2>🎉 胜利！</h2>
    <p class="sub">所有方块已翻开，太厉害了！</p>
    <div class="stats-grid">
      <div class="stat-box"><div class="label">翻开方块</div><div class="value" id="win-rev">0</div></div>
      <div class="stat-box"><div class="label">合并次数</div><div class="value" id="win-merge">0</div></div>
    </div>
    <button class="btn-primary" onclick="startGame()">再来一局</button>
  </div>
</div>

<!-- Lose modal -->
<div id="lose-modal" class="modal hidden">
  <div class="modal-box">
    <h2>💫 游戏结束</h2>
    <p class="sub">已无法凑成 10，再试一次吧！</p>
    <div class="stats-grid">
      <div class="stat-box"><div class="label">翻开方块</div><div class="value" id="lose-rev">0</div></div>
      <div class="stat-box"><div class="label">合并次数</div><div class="value" id="lose-merge">0</div></div>
    </div>
    <button class="btn-primary" onclick="startGame()">再来一局</button>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const GRID = 32;
const START_R = Math.floor(GRID / 2) - 1; // 15
const START_C = Math.floor(GRID / 2) - 1;

// ── State ──────────────────────────────────────────────────────────────────
let grid = [];
let mergeCount = 0;
let gameOver = false;

// Drag
let dragSrc = null;   // { r, c }
let dragPx = 0, dragPy = 0;  // pixel coords on canvas (logical)
let isDragging = false;

// Particles
let particles = [];

// Canvas
let canvas, ctx, CELL = 20, dpr = 1;

// ── Helpers ────────────────────────────────────────────────────────────────
function rng(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

function isMovableInSet(g, r, c, revSet) {
  if (g[r][c].val == null) return false;
  const inSet = revSet.has(r * GRID + c);
  if (!g[r][c].revealed && !inSet) return false;
  for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    const nr = r + dr, nc = c + dc;
    if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) continue;
    if (!revSet.has(nr * GRID + nc)) return false;
  }
  return true;
}

function revealNeighbors(r, c) {
  for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID)
      grid[nr][nc].revealed = true;
  }
}

function countRevealed() {
  let n = 0;
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      if (grid[r][c].revealed) n++;
  return n;
}

function checkWin() {
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      if (!grid[r][c].revealed) return false;
  return true;
}

function canMakeMove() {
  // Count occurrences; need two distinct cells summing to 10
  const count = new Array(10).fill(0);
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      if (grid[r][c].revealed && grid[r][c].val != null)
        count[grid[r][c].val]++;
  for (let v = 1; v <= 9; v++) {
    if (count[v] === 0) continue;
    const w = 10 - v;
    if (w < 1 || w > 9) continue;
    if (v === w && count[v] >= 2) return true;
    if (v !== w && count[w] > 0) return true;
  }
  return false;
}

// ── Board generation ───────────────────────────────────────────────────────
function generateBoard() {
  const g = [];
  for (let r = 0; r < GRID; r++) {
    g[r] = [];
    for (let c = 0; c < GRID; c++)
      g[r][c] = { val: rng(1, 9), revealed: false };
  }

  // Reveal center 3×3
  for (let r = START_R; r < START_R + 3; r++)
    for (let c = START_C; c < START_C + 3; c++)
      g[r][c].revealed = true;

  // BFS to assign values ensuring solvability along each expansion path
  const revealed = new Set();
  for (let r = START_R; r < START_R + 3; r++)
    for (let c = START_C; c < START_C + 3; c++)
      revealed.add(r * GRID + c);

  const queue = [], inQueue = new Set();

  function enq(r, c) {
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) continue;
      const k = nr * GRID + nc;
      if (!revealed.has(k) && !inQueue.has(k)) { inQueue.add(k); queue.push([nr, nc]); }
    }
  }

  for (let r = START_R; r < START_R + 3; r++)
    for (let c = START_C; c < START_C + 3; c++) enq(r, c);

  for (let qi = 0; qi < queue.length; qi++) {
    const [nr, nc] = queue[qi];
    const movable = [];
    for (const key of revealed) {
      const r2 = Math.floor(key / GRID), c2 = key % GRID;
      if (isMovableInSet(g, r2, c2, revealed)) movable.push(g[r2][c2].val);
    }
    if (movable.length > 0) {
      const mv = movable[rng(0, movable.length - 1)];
      const need = 10 - mv;
      g[nr][nc].val = (need >= 1 && need <= 9) ? need : rng(1, 9);
    }
    revealed.add(nr * GRID + nc);
    g[nr][nc].revealed = false;
    enq(nr, nc);
  }

  // Guarantee first move: center cell (movable) needs a complement among the 8 others
  const cr = START_R + 1, cc = START_C + 1;
  const need = 10 - g[cr][cc].val;
  if (need >= 1 && need <= 9) {
    const ring = [];
    for (let r = START_R; r < START_R + 3; r++)
      for (let c = START_C; c < START_C + 3; c++)
        if (!(r === cr && c === cc)) ring.push([r, c]);
    const [pr, pc] = ring[rng(0, ring.length - 1)];
    g[pr][pc].val = need;
  }

  return g;
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnParticles(cx, cy) {
  const colors = ['#6ee7b7', '#f87171', '#fcd34d', '#a78bfa', '#60a5fa'];
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      radius: 2 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
  if (!animRunning) animLoop();
}

let animRunning = false;
function animLoop() {
  animRunning = true;
  particles = particles.filter(p => p.alpha > 0.05);
  if (particles.length === 0) { animRunning = false; render(); return; }
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.alpha -= 0.035;
  }
  render();
  requestAnimationFrame(animLoop);
}

// ── Canvas setup ───────────────────────────────────────────────────────────
function setupCanvas() {
  canvas = document.getElementById('board-canvas');
  ctx = canvas.getContext('2d');
  dpr = window.devicePixelRatio || 1;

  const area = document.getElementById('board-area');
  const aw = area.clientWidth  - 24;
  const ah = area.clientHeight - 24;
  CELL = Math.max(12, Math.floor(Math.min(aw, ah) / GRID));

  const px = GRID * CELL;
  canvas.width  = px * dpr;
  canvas.height = px * dpr;
  canvas.style.width  = px + 'px';
  canvas.style.height = px + 'px';
  ctx.scale(dpr, dpr);
}

function pointerCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const px = (clientX - rect.left) * (canvas.width  / dpr / rect.width);
  const py = (clientY - rect.top)  * (canvas.height / dpr / rect.height);
  return { px, py, r: Math.floor(py / CELL), c: Math.floor(px / CELL) };
}

// ── Rendering ──────────────────────────────────────────────────────────────
const C_HIDDEN    = '#0d0d1a';
const C_HIDDEN_BD = '#1a1a30';
const C_OPEN      = '#2d4a6e';
const C_OPEN_BD   = '#5b8fc9';
const C_TARGET    = '#5a1a1a';
const C_TARGET_BD = '#f87171';

function render() {
  if (!ctx || !grid.length) return;
  const W = GRID * CELL;
  ctx.clearRect(0, 0, W, W);

  // Highlight drag target
  let tgt = null;
  if (isDragging && dragSrc) {
    const tc = Math.floor(dragPx / CELL), tr = Math.floor(dragPy / CELL);
    if (tr >= 0 && tr < GRID && tc >= 0 && tc < GRID &&
        grid[tr][tc].revealed && grid[tr][tc].val != null &&
        !(tr === dragSrc.r && tc === dragSrc.c)) {
      if (grid[dragSrc.r][dragSrc.c].val + grid[tr][tc].val === 10)
        tgt = { r: tr, c: tc };
    }
  }

  const gap = 2, radius = 3;
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      if (isDragging && dragSrc && r === dragSrc.r && c === dragSrc.c) continue;

      const cell = grid[r][c];
      const x = c * CELL + gap, y = r * CELL + gap;
      const w = CELL - gap * 2;

      let bg, bd, lw;
      if (!cell.revealed) {
        bg = C_HIDDEN; bd = C_HIDDEN_BD; lw = 0.8;
      } else if (tgt && r === tgt.r && c === tgt.c) {
        bg = C_TARGET; bd = C_TARGET_BD; lw = 1.8;
      } else {
        bg = C_OPEN; bd = C_OPEN_BD; lw = 0.8;
      }

      ctx.fillStyle = bg;
      roundRect(ctx, x, y, w, w, radius);
      ctx.fill();

      // Hatching on hidden cells for extra visual distinction
      if (!cell.revealed) {
        ctx.save();
        ctx.clip();
        ctx.strokeStyle = '#1f1f38';
        ctx.lineWidth = 0.8;
        const step = 5;
        for (let d = -w; d < w * 2; d += step) {
          ctx.beginPath();
          ctx.moveTo(x + d, y);
          ctx.lineTo(x + d + w, y + w);
          ctx.stroke();
        }
        ctx.restore();
      }

      ctx.strokeStyle = bd;
      ctx.lineWidth = lw;
      roundRect(ctx, x, y, w, w, radius);
      ctx.stroke();

      if (cell.revealed && cell.val != null) {
        drawNum(cell.val, x + w / 2, y + w / 2);
      }
    }
  }

  // Drag ghost
  if (isDragging && dragSrc) {
    const val = grid[dragSrc.r][dragSrc.c].val;
    const gx = dragPx - CELL / 2, gy = dragPy - CELL / 2;
    const w = CELL - gap * 2;

    ctx.save();
    ctx.shadowColor = '#a78bfa';
    ctx.shadowBlur = 12;
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = '#2d1060';
    roundRect(ctx, gx + gap, gy + gap, w, w, radius);
    ctx.fill();
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
    drawNum(val, gx + CELL / 2, gy + CELL / 2);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawNum(val, x, y) {
  const fs = Math.max(9, Math.floor(CELL * 0.5));
  ctx.font = `bold ${fs}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(val, x, y);
}

// ── Status ─────────────────────────────────────────────────────────────────
function updateStatus() {
  const rev = countRevealed();
  document.getElementById('stat-rev').textContent = rev;
  document.getElementById('stat-total').textContent = GRID * GRID;
  document.getElementById('stat-merge').textContent = mergeCount;
}

// ── Game lifecycle ──────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('start-modal').classList.add('hidden');
  document.getElementById('win-modal').classList.add('hidden');
  document.getElementById('lose-modal').classList.add('hidden');
  mergeCount = 0;
  gameOver = false;
  isDragging = false;
  dragSrc = null;
  particles = [];
  grid = generateBoard();
  setupCanvas();
  updateStatus();
  render();
}

function endGame(win) {
  gameOver = true;
  const rev = countRevealed();
  if (win) {
    document.getElementById('win-rev').textContent   = rev;
    document.getElementById('win-merge').textContent  = mergeCount;
    document.getElementById('win-modal').classList.remove('hidden');
  } else {
    document.getElementById('lose-rev').textContent  = rev;
    document.getElementById('lose-merge').textContent = mergeCount;
    document.getElementById('lose-modal').classList.remove('hidden');
  }
}

// ── Input ───────────────────────────────────────────────────────────────────
function onDown(e) {
  if (gameOver) return;
  e.preventDefault();
  const { px, py, r, c } = pointerCanvas(e);
  if (r < 0 || r >= GRID || c < 0 || c >= GRID) return;
  if (!grid[r][c].revealed || grid[r][c].val == null) return;
  dragSrc = { r, c };
  dragPx = px; dragPy = py;
  isDragging = true;
  canvas.style.cursor = 'grabbing';
  render();
}

function onMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const { px, py } = pointerCanvas(e);
  dragPx = px; dragPy = py;
  render();
}

function onUp(e) {
  if (!isDragging) return;
  e.preventDefault();
  canvas.style.cursor = 'default';
  const { r, c } = pointerCanvas(e);
  const src = dragSrc;
  isDragging = false;
  dragSrc = null;

  if (r >= 0 && r < GRID && c >= 0 && c < GRID &&
      !(r === src.r && c === src.c) &&
      grid[r][c].revealed && grid[r][c].val != null) {

    const sv = grid[src.r][src.c].val;
    const tv = grid[r][c].val;

    if (sv + tv === 10) {
      // Both disappear; reveal neighbors of target
      const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2;
      grid[r][c].val = null;
      grid[src.r][src.c].val = null;
      revealNeighbors(r, c);
      mergeCount++;
      updateStatus();
      spawnParticles(cx, cy);

      if (checkWin()) {
        setTimeout(() => endGame(true), 600);
        return;
      }
      if (!canMakeMove()) {
        setTimeout(() => endGame(false), 600);
        return;
      }
      render();
      return;
    }
  }

  render();
}

// ── Boot ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setupCanvas();
  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  window.addEventListener('mouseup',    onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove',  onMove, { passive: false });
  window.addEventListener('touchend',   onUp,   { passive: false });
  window.addEventListener('resize', () => {
    if (grid.length) { setupCanvas(); render(); }
  });
});
</script>
</body>
</html>
