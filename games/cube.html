<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>魔方挑战 — 3D Cube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#e0e0ff}
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(15,10,35,.85);
  backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 20px;z-index:100;
  border-bottom:1px solid rgba(120,80,255,.3)}
#topbar a{color:#a78bfa;text-decoration:none;font-size:14px;margin-right:20px;opacity:.8;transition:opacity .2s}
#topbar a:hover{opacity:1}
#topbar h1{font-size:16px;font-weight:600;background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.stat{display:flex;flex-direction:column;align-items:center;margin-left:18px}
.stat-label{font-size:10px;color:#6b7280;letter-spacing:.5px;text-transform:uppercase}
.stat-val{font-size:18px;font-weight:700;color:#c4b5fd}
#btnRow{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:100}
.btn{padding:9px 22px;border:1px solid rgba(167,139,250,.4);background:rgba(30,20,60,.7);
  color:#c4b5fd;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;
  transition:all .2s;backdrop-filter:blur(8px)}
.btn:hover{background:rgba(167,139,250,.2);border-color:#a78bfa;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
#solvedBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:linear-gradient(135deg,rgba(20,10,50,.95),rgba(40,20,80,.95));
  border:2px solid #a78bfa;border-radius:16px;padding:32px 48px;text-align:center;
  z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
#solvedBanner.show{transform:translate(-50%,-50%) scale(1)}
#solvedBanner h2{font-size:28px;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
#solvedBanner p{color:#9ca3af;font-size:14px}
#hint{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
  color:rgba(167,139,250,.5);font-size:12px;pointer-events:none}
canvas{display:block}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">← 返回</a>
  <h1>魔方挑战</h1>
  <div class="stat"><span class="stat-val" id="timerEl">00:00</span><span class="stat-label">时间</span></div>
  <div class="stat"><span class="stat-val" id="movesEl">0</span><span class="stat-label">步数</span></div>
  <div class="stat"><span class="stat-val" id="bestEl">--</span><span class="stat-label">最佳</span></div>
</div>
<canvas id="c"></canvas>
<div id="btnRow">
  <button class="btn" onclick="scrambleCube()">打乱</button>
  <button class="btn" onclick="resetCube()">重置</button>
</div>
<div id="hint">拖拽面旋转 · 背景拖拽视角 · 滚轮缩放</div>
<div id="solvedBanner">
  <h2>🎉 已还原！</h2>
  <p id="solvedMsg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
// ─── SCENE SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camera.position.set(6,5,8);
camera.lookAt(0,0,0);

function resize(){
  const w=innerWidth, h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize',resize);

// ─── LIGHTING ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x6644bb,0.7));
const dirLight = new THREE.DirectionalLight(0xffffff,0.9);
dirLight.position.set(8,12,8);
dirLight.castShadow=true;
scene.add(dirLight);
const pt1 = new THREE.PointLight(0x8866ff,1.2,30);
pt1.position.set(-5,5,5);
scene.add(pt1);
const pt2 = new THREE.PointLight(0x4488ff,0.8,25);
pt2.position.set(5,-5,-5);
scene.add(pt2);

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
const bgVert = `
varying vec2 vUv;
void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}
`;
const bgFrag = `
varying vec2 vUv;
uniform float time;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
void main(){
  vec2 uv=(vUv-.5)*2.;
  float n=noise(uv*2.+time*.05)+noise(uv*4.+time*.08)*.5+noise(uv*8.+time*.12)*.25;
  vec3 col=mix(vec3(.02,.01,.06),vec3(.06,.02,.14),n);
  col+=vec3(.04,.02,.12)*noise(uv*6.-time*.04);
  // stars
  vec2 sg=fract(vUv*80.);float sc=hash(floor(vUv*80.));
  if(sc>.97){float b=smoothstep(.4,.0,length(sg-.5));col+=vec3(.6,.7,1.)*b*(.5+.5*sin(time+sc*60.));}
  gl_FragColor=vec4(col,1.);}
`;
const bgMat = new THREE.ShaderMaterial({vertexShader:bgVert,fragmentShader:bgFrag,
  uniforms:{time:{value:0}},side:THREE.BackSide,depthWrite:false});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(200,32,16),bgMat));

// ─── CUBE DATA ─────────────────────────────────────────────────────────────────
// Face colors: 0=+X(R) 1=-X(O) 2=+Y(W) 3=-Y(Y) 4=+Z(G) 5=-Z(B)
const FACE_COLORS = [0xcc2200,0xff7700,0xffffff,0xffdd00,0x00aa44,0x0055cc];

const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

let cubies = []; // {mesh, gx, gy, gz}

function makeCubie(gx,gy,gz){
  const geo = new THREE.BoxGeometry(0.94,0.94,0.94);
  const mats = FACE_COLORS.map((c,i)=>{
    // only show face color on outer faces
    const isOuter = (i===0&&gx===1)||(i===1&&gx===-1)||
                    (i===2&&gy===1)||(i===3&&gy===-1)||
                    (i===4&&gz===1)||(i===5&&gz===-1);
    return new THREE.MeshStandardMaterial({
      color: isOuter?c:0x111111,
      roughness:.25, metalness:.15,
      emissive: isOuter?c:0x000000,
      emissiveIntensity: isOuter?.05:0
    });
  });
  const mesh = new THREE.Mesh(geo,mats);
  mesh.position.set(gx,gy,gz);
  mesh.castShadow=true;
  cubeGroup.add(mesh);
  // thin black gap lines via outline
  const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(0.94,0.94,0.94));
  const edgeMat = new THREE.LineBasicMaterial({color:0x000000,transparent:true,opacity:.8});
  const edges = new THREE.LineSegments(edgeGeo,edgeMat);
  mesh.add(edges);
  return {mesh,gx,gy,gz};
}

function buildCube(){
  cubies.forEach(c=>cubeGroup.remove(c.mesh));
  cubies=[];
  for(let x=-1;x<=1;x++)for(let y=-1;y<=1;y++)for(let z=-1;z<=1;z++){
    if(x===0&&y===0&&z===0)continue;
    cubies.push(makeCubie(x,y,z));
  }
}
buildCube();

// ─── FACE NORMAL TABLE (materialIndex → local axis vector) ────────────────────
// Three.js BoxGeometry face order: +X,-X,+Y,-Y,+Z,-Z
const FACE_NORMALS = [
  new THREE.Vector3(1,0,0),  // 0: +X
  new THREE.Vector3(-1,0,0), // 1: -X
  new THREE.Vector3(0,1,0),  // 2: +Y
  new THREE.Vector3(0,-1,0), // 3: -Y
  new THREE.Vector3(0,0,1),  // 4: +Z
  new THREE.Vector3(0,0,-1), // 5: -Z
];

// ─── MOVE SYSTEM ──────────────────────────────────────────────────────────────
// Move: axis ('x'|'y'|'z'), layer (-1|0|1), dir (1=CW,-1=CCW when looking + direction)
const pivotGroup = new THREE.Group();
cubeGroup.add(pivotGroup);

let animating = false;
let moveQueue = [];
let moveCount = 0;
let timerActive = false;
let timerStart = 0;
let timerEl = document.getElementById('timerEl');
let movesEl = document.getElementById('movesEl');
let bestEl = document.getElementById('bestEl');
let best = parseInt(localStorage.getItem('cube_best_secs')||'0')||Infinity;
if(best!==Infinity)bestEl.textContent=fmtTime(best);
let solvedOnce = false; // prevent immediate solve trigger on reset

function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function enqueueMove(axis,layer,dir,counting=true){
  autoRotate=false;
  moveQueue.push({axis,layer,dir,counting});
  if(!animating)processQueue();
}

function processQueue(){
  if(!moveQueue.length){animating=false;return;}
  animating=true;
  const {axis,layer,dir,counting} = moveQueue.shift();
  doMove(axis,layer,dir,counting);
}

function doMove(axis,layer,dir,counting){
  // collect cubies in this slice
  const slice = cubies.filter(c=>Math.round(c[axis==='x'?'gx':axis==='y'?'gy':'gz'])===layer);
  
  // attach to pivot
  pivotGroup.rotation.set(0,0,0);
  pivotGroup.quaternion.identity();
  slice.forEach(c=>pivotGroup.attach(c.mesh));

  const angle = dir * Math.PI/2;
  const DURATION = 160;
  const start = performance.now();

  function animate(now){
    const t = Math.min((now-start)/DURATION,1);
    const ease = t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const a = angle*ease;
    if(axis==='x')pivotGroup.rotation.x=a;
    else if(axis==='y')pivotGroup.rotation.y=a;
    else pivotGroup.rotation.z=a;
    if(t<1){requestAnimationFrame(animate);return;}
    // finalize
    if(axis==='x')pivotGroup.rotation.x=angle;
    else if(axis==='y')pivotGroup.rotation.y=angle;
    else pivotGroup.rotation.z=angle;
    slice.forEach(c=>{
      cubeGroup.attach(c.mesh);
      // snap position
      c.mesh.position.x=Math.round(c.mesh.position.x);
      c.mesh.position.y=Math.round(c.mesh.position.y);
      c.mesh.position.z=Math.round(c.mesh.position.z);
      // snap rotation
      const e=c.mesh.rotation;
      e.x=Math.round(e.x/(Math.PI/2))*Math.PI/2;
      e.y=Math.round(e.y/(Math.PI/2))*Math.PI/2;
      e.z=Math.round(e.z/(Math.PI/2))*Math.PI/2;
      // update grid coords
      c.gx=Math.round(c.mesh.position.x);
      c.gy=Math.round(c.mesh.position.y);
      c.gz=Math.round(c.mesh.position.z);
    });
    if(counting){
      moveCount++;
      movesEl.textContent=moveCount;
      if(!timerActive&&!solvedOnce){timerActive=true;timerStart=Date.now();}
      spawnMoveParticles();
      ringPulse=1.0;
    }
    checkSolved();
    processQueue();
  }
  requestAnimationFrame(animate);
}

// ─── SOLVED CHECK ─────────────────────────────────────────────────────────────
// After rotations, material[i] no longer necessarily faces its original direction.
// We must transform each face's normal by the cubie's current rotation to find
// which material is actually facing outward in each world direction.

// Get the material index currently facing a given world-space direction on a cubie.
function getMaterialFacingDir(cubie, worldDir){
  // Transform worldDir to cubie's local space
  const invQ = cubie.mesh.quaternion.clone().invert();
  const localDir = worldDir.clone().applyQuaternion(invQ);
  // Find which of the 6 face normals best aligns with localDir
  let best=-Infinity, bestIdx=0;
  for(let i=0;i<6;i++){
    const d=FACE_NORMALS[i].dot(localDir);
    if(d>best){best=d;bestIdx=i;}
  }
  return bestIdx;
}

function checkSolved(){
  if(solvedOnce)return;
  // The 6 outward face directions in cubeGroup local space
  const faceChecks=[
    {axis:'gx',val:1, dir:new THREE.Vector3(1,0,0)},
    {axis:'gx',val:-1,dir:new THREE.Vector3(-1,0,0)},
    {axis:'gy',val:1, dir:new THREE.Vector3(0,1,0)},
    {axis:'gy',val:-1,dir:new THREE.Vector3(0,-1,0)},
    {axis:'gz',val:1, dir:new THREE.Vector3(0,0,1)},
    {axis:'gz',val:-1,dir:new THREE.Vector3(0,0,-1)},
  ];
  for(const f of faceChecks){
    const outer=cubies.filter(c=>c[f.axis]===f.val);
    // For each cubie on this face, find which material faces outward and get its color
    const colors=outer.map(c=>{
      const mi=getMaterialFacingDir(c,f.dir);
      return c.mesh.material[mi].color.getHex();
    });
    if(!colors.every(col=>col===colors[0]))return;
  }
  // solved!
  solvedOnce=true;
  timerActive=false;
  const secs=Math.round((Date.now()-timerStart)/1000);
  if(moveCount>0){
    if(secs<best){best=secs;localStorage.setItem('cube_best_secs',secs);bestEl.textContent=fmtTime(secs);}
    const msg=document.getElementById('solvedMsg');
    msg.textContent=`用时 ${fmtTime(secs)} · ${moveCount} 步`;
    document.getElementById('solvedBanner').classList.add('show');
    setTimeout(()=>document.getElementById('solvedBanner').classList.remove('show'),3500);
  }
}

// ─── SCRAMBLE / RESET ─────────────────────────────────────────────────────────
const AXES=['x','y','z'];
const LAYERS=[-1,0,1];

function scrambleCube(){
  document.getElementById('solvedBanner').classList.remove('show');
  solvedOnce=true; // block trigger during scramble
  moveCount=0;movesEl.textContent='0';
  timerActive=false;
  const moves=[];
  for(let i=0;i<20;i++){
    const axis=AXES[Math.floor(Math.random()*3)];
    const layer=LAYERS[Math.floor(Math.random()*3)];
    const dir=Math.random()<.5?1:-1;
    moves.push({axis,layer,dir});
  }
  moves.forEach(m=>enqueueMove(m.axis,m.layer,m.dir,false));
  // after scramble, allow solved check
  const afterScramble=()=>{if(animating){setTimeout(afterScramble,50);}else{solvedOnce=false;}};
  setTimeout(afterScramble,50);
}

function resetCube(){
  document.getElementById('solvedBanner').classList.remove('show');
  moveQueue=[];animating=false;
  buildCube();
  moveCount=0;movesEl.textContent='0';
  timerActive=false;
  solvedOnce=false;
}

// ─── RAYCASTER & DRAG ─────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse2d = new THREE.Vector2();

// State
let dragState = null; // {type:'face'|'orbit', startX, startY, hitInfo}
let orbitState = null;
let orbitStart = {theta:0,phi:0};
// spherical coords for camera
let camTheta = Math.atan2(camera.position.x, camera.position.z); // azimuth
let camPhi = Math.acos(camera.position.y / camera.position.length()); // polar
let camRadius = camera.position.length();

function updateCamera(){
  camera.position.set(
    camRadius*Math.sin(camPhi)*Math.sin(camTheta),
    camRadius*Math.cos(camPhi),
    camRadius*Math.sin(camPhi)*Math.cos(camTheta)
  );
  camera.lookAt(0,0,0);
}
updateCamera();

function getMouseNDC(e){
  const r=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return new THREE.Vector2(
    ((cx-r.left)/r.width)*2-1,
    -((cy-r.top)/r.height)*2+1
  );
}

function hitTest(ndc){
  raycaster.setFromCamera(ndc,camera);
  const meshes=cubies.map(c=>c.mesh);
  const hits=raycaster.intersectObjects(meshes,false);
  if(!hits.length)return null;
  const hit=hits[0];
  const cubie=cubies.find(c=>c.mesh===hit.object);
  return {cubie, faceIndex:hit.face.materialIndex, point:hit.point.clone()};
}

// ─── MOVE DETERMINATION ───────────────────────────────────────────────────────
// This is the core: given a face (materialIndex 0-5) and screen drag (dx,dy),
// determine which slice rotates and in which direction.
//
// Strategy:
// 1. faceNormal is in cubeGroup LOCAL space (directly from FACE_NORMALS table)
// 2. Convert screen drag → world drag → cubeGroup local drag
// 3. Project local drag onto face tangent plane
// 4. The dominant tangent axis determines which slice rotates (and direction)

function determineMoveFromDrag(hitInfo, screenDx, screenDy){
  const {cubie, faceIndex} = hitInfo;

  // FACE_NORMALS[faceIndex] is in cubie LOCAL space.
  // Transform it to cubeGroup local space via the cubie's quaternion.
  const faceNormal = FACE_NORMALS[faceIndex].clone()
    .applyQuaternion(cubie.mesh.quaternion)
    .normalize();
  
  // Convert screen drag to a direction in cubeGroup local space
  // Screen right → camera right, Screen up → camera up
  const camRight = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
  const camUp    = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
  
  // World space drag vector (unit: game units per pixel isn't important, just direction)
  const worldDrag = new THREE.Vector3()
    .addScaledVector(camRight, screenDx)
    .addScaledVector(camUp, -screenDy);
  
  // Transform to cubeGroup local space
  // cubeGroup may be rotated by auto-spin or orbit manipulation,
  // so we MUST apply the inverse of cubeGroup's world matrix
  const invWorld = new THREE.Matrix4().copy(cubeGroup.matrixWorld).invert();
  const localDrag = worldDrag.clone().transformDirection(invWorld);
  
  // Project onto the face's tangent plane (remove normal component)
  localDrag.addScaledVector(faceNormal, -localDrag.dot(faceNormal));
  
  // The two tangent axes: all axes except the face normal's dominant axis
  const fn = faceNormal; // e.g. (1,0,0) for +X face
  const absN = [Math.abs(fn.x),Math.abs(fn.y),Math.abs(fn.z)];
  // dominant normal axis index
  const normalAxisIdx = absN.indexOf(Math.max(...absN));
  
  // two tangent axis indices
  const tangentAxes = [0,1,2].filter(i=>i!==normalAxisIdx);
  const [t0,t1] = tangentAxes;
  
  const comps = [localDrag.x, localDrag.y, localDrag.z];
  const a0 = Math.abs(comps[t0]);
  const a1 = Math.abs(comps[t1]);
  
  if(Math.max(a0,a1)<0.001)return null; // too small
  
  const dragAxisIdx = a0>a1?t0:t1;
  const dragSign = comps[dragAxisIdx]>0?1:-1;
  
  // The rotation axis is the remaining axis (neither faceNormal nor drag axis)
  const rotAxisIdx = [0,1,2].find(i=>i!==normalAxisIdx&&i!==dragAxisIdx);
  
  // Which slice? determined by the cubie's coordinate on the rotation axis
  const axisNames = ['x','y','z'];
  const rotAxis = axisNames[rotAxisIdx];
  const gridCoords = {x:cubie.gx, y:cubie.gy, z:cubie.gz};
  const layer = gridCoords[rotAxis];
  
  // Direction: cross product of faceNormal and dragDirection gives rotation axis direction.
  // The sign of the rotation depends on whether our computed rot axis aligns with that cross product.
  const faceVec3 = faceNormal.clone();
  const dragVec3 = new THREE.Vector3();
  dragVec3.setComponent(dragAxisIdx, dragSign);
  const crossVec = new THREE.Vector3().crossVectors(faceVec3, dragVec3);
  // The cross product gives the rotation vector; check its component on rotAxisIdx
  const crossComp = [crossVec.x, crossVec.y, crossVec.z][rotAxisIdx];
  const dir = crossComp>0?1:-1;
  
  return {axis:rotAxis, layer, dir};
}

// ─── POINTER EVENTS ───────────────────────────────────────────────────────────
const DRAG_THRESHOLD = 4; // px before we commit to a drag type

function onPointerDown(e){
  if(e.type==='touchstart')e.preventDefault();
  const ndc=getMouseNDC(e);
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const hit=hitTest(ndc);
  dragState={
    type:null, // not yet decided
    startX:cx, startY:cy,
    hitInfo:hit,
    committed:false
  };
  orbitStart={theta:camTheta, phi:camPhi};
}

function onPointerMove(e){
  if(!dragState)return;
  if(e.type==='touchmove')e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const dx=cx-dragState.startX;
  const dy=cy-dragState.startY;
  
  if(!dragState.committed){
    if(Math.sqrt(dx*dx+dy*dy)<DRAG_THRESHOLD)return;
    // commit: decide type
    dragState.committed=true;
    dragState.type = (dragState.hitInfo&&!animating)?'face':'orbit';
  }
  
  if(dragState.type==='orbit'){
    camTheta=orbitStart.theta - dx*0.006;
    camPhi=Math.max(0.15,Math.min(Math.PI-0.15, orbitStart.phi - dy*0.006));
    updateCamera();
  }
}

function onPointerUp(e){
  if(!dragState)return;
  if(e.type==='touchend')e.preventDefault();
  const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
  const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
  const dx=cx-dragState.startX;
  const dy=cy-dragState.startY;
  
  if(dragState.committed&&dragState.type==='face'&&dragState.hitInfo&&!animating){
    const move=determineMoveFromDrag(dragState.hitInfo, dx, dy);
    if(move)enqueueMove(move.axis,move.layer,move.dir,true);
  }
  dragState=null;
}

canvas.addEventListener('mousedown',onPointerDown);
window.addEventListener('mousemove',onPointerMove);
window.addEventListener('mouseup',onPointerUp);
canvas.addEventListener('touchstart',onPointerDown,{passive:false});
window.addEventListener('touchmove',onPointerMove,{passive:false});
window.addEventListener('touchend',onPointerUp,{passive:false});

// Wheel zoom
canvas.addEventListener('wheel',e=>{
  camRadius=Math.max(4,Math.min(20,camRadius+e.deltaY*0.01));
  updateCamera();
},{passive:true});

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
// e.code is layout-independent: 'KeyU','KeyD','KeyL','KeyR','KeyF','KeyB'
// Shift = counterclockwise (dir=-1), plain = clockwise (dir=1)
const KEY_MOVES = {
  KeyU:{axis:'y',layer: 1},
  KeyD:{axis:'y',layer:-1},
  KeyR:{axis:'x',layer: 1},
  KeyL:{axis:'x',layer:-1},
  KeyF:{axis:'z',layer: 1},
  KeyB:{axis:'z',layer:-1},
  KeyE:{axis:'y',layer: 0}, // middle horizontal (E/M/S for middle slices)
  KeyM:{axis:'x',layer: 0},
  KeyS:{axis:'z',layer: 0},
};

window.addEventListener('keydown',e=>{
  if(animating)return;
  const m=KEY_MOVES[e.code];
  if(!m)return;
  const dir=e.shiftKey?-1:1;
  enqueueMove(m.axis,m.layer,dir,true);
});

// ─── PARTICLES ────────────────────────────────────────────────────────────────
const PARTICLE_COUNT = 300;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PARTICLE_COUNT*3);
const pVel = [];
const pLife = new Float32Array(PARTICLE_COUNT);
for(let i=0;i<PARTICLE_COUNT;i++){
  pPos[i*3]=100; // offscreen initially
  pLife[i]=0;
  pVel.push({x:0,y:0,z:0});
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat = new THREE.PointsMaterial({
  color:0xc4b5fd,size:.12,transparent:true,opacity:.9,
  blending:THREE.AdditiveBlending,depthWrite:false
});
const particles = new THREE.Points(pGeo,pMat);
scene.add(particles);

let pIdx=0;
function spawnMoveParticles(){
  const count=30;
  for(let i=0;i<count;i++){
    const idx=(pIdx+i)%PARTICLE_COUNT;
    pPos[idx*3]=(Math.random()-0.5)*4;
    pPos[idx*3+1]=(Math.random()-0.5)*4;
    pPos[idx*3+2]=(Math.random()-0.5)*4;
    pLife[idx]=1.0;
    pVel[idx]={
      x:(Math.random()-0.5)*.06,
      y:(Math.random()-0.5)*.06+.02,
      z:(Math.random()-0.5)*.06
    };
  }
  pIdx=(pIdx+count)%PARTICLE_COUNT;
}

function updateParticles(){
  for(let i=0;i<PARTICLE_COUNT;i++){
    if(pLife[i]<=0)continue;
    pLife[i]-=0.018;
    pPos[i*3]+=pVel[i].x;
    pPos[i*3+1]+=pVel[i].y;
    pPos[i*3+2]+=pVel[i].z;
    if(pLife[i]<=0)pPos[i*3]=100;
  }
  pGeo.attributes.position.needsUpdate=true;
}

// Ambient floating particles (always on)
const ambGeo = new THREE.BufferGeometry();
const AMB_COUNT=800;
const ambPos=new Float32Array(AMB_COUNT*3);
for(let i=0;i<AMB_COUNT;i++){
  ambPos[i*3]=(Math.random()-0.5)*40;
  ambPos[i*3+1]=(Math.random()-0.5)*40;
  ambPos[i*3+2]=(Math.random()-0.5)*40;
}
ambGeo.setAttribute('position',new THREE.BufferAttribute(ambPos,3));
const ambMat=new THREE.PointsMaterial({color:0x8866cc,size:.06,transparent:true,opacity:.4,
  blending:THREE.AdditiveBlending,depthWrite:false});
scene.add(new THREE.Points(ambGeo,ambMat));

// ─── GLOW RINGS (pulse on solve) ──────────────────────────────────────────────
function makeGlowRing(r,color){
  const geo=new THREE.TorusGeometry(r,.04,8,64);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.0,
    blending:THREE.AdditiveBlending,depthWrite:false});
  const m=new THREE.Mesh(geo,mat);
  scene.add(m);
  return m;
}
const ring1=makeGlowRing(3.5,0xa78bfa);
const ring2=makeGlowRing(4.0,0x60a5fa);
const ring3=makeGlowRing(4.5,0x34d399);
ring2.rotation.x=Math.PI/2;
ring3.rotation.y=Math.PI/3;
let ringPulse=0;

// ─── CUBE EDGE GLOW ───────────────────────────────────────────────────────────
// thin neon lines along cubeGroup bounding box edges
const glowEdges=(()=>{
  const s=1.53; // half-size of whole 3x3 cube + gap
  const pts=[];
  // 12 edges of a cube
  const corners=[[-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
                 [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]];
  const edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],
               [0,4],[1,5],[2,6],[3,7]];
  edges.forEach(([a,b])=>{
    pts.push(new THREE.Vector3(...corners[a]),new THREE.Vector3(...corners[b]));
  });
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:0x7c3aed,transparent:true,opacity:.5,
    blending:THREE.AdditiveBlending});
  const ls=new THREE.LineSegments(geo,mat);
  cubeGroup.add(ls);
  return {mat};
})();

// ─── AUTO ROTATE ──────────────────────────────────────────────────────────────
let autoRotate=true;
canvas.addEventListener('mousedown',()=>{autoRotate=false;});

// ─── TIMER ────────────────────────────────────────────────────────────────────
function updateTimer(){
  if(!timerActive)return;
  const s=Math.round((Date.now()-timerStart)/1000);
  timerEl.textContent=fmtTime(s);
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
let lastTime=0;
function renderLoop(now){
  requestAnimationFrame(renderLoop);
  const dt=(now-lastTime)/1000;
  lastTime=now;
  
  bgMat.uniforms.time.value=now*0.001;
  
  if(autoRotate){
    cubeGroup.rotation.y+=0.003;
    cubeGroup.rotation.x+=0.001;
  }
  
  // pulse lights
  pt1.intensity=1.0+0.4*Math.sin(now*0.0013);
  pt2.intensity=0.7+0.3*Math.cos(now*0.0017);
  
  // ring pulse on move
  if(ringPulse>0){
    ringPulse=Math.max(0,ringPulse-dt*2);
    ring1.material.opacity=ringPulse*.6;
    ring2.material.opacity=ringPulse*.5;
    ring3.material.opacity=ringPulse*.4;
    ring1.scale.setScalar(1+ringPulse*.3);
    ring2.scale.setScalar(1+ringPulse*.25);
    ring3.scale.setScalar(1+ringPulse*.2);
    ring1.rotation.z+=0.02;
    ring2.rotation.x+=0.015;
    ring3.rotation.y+=0.018;
  }
  
  // glow edge pulse
  glowEdges.mat.opacity=0.3+0.2*Math.sin(now*0.002);
  
  updateParticles();
  updateTimer();
  renderer.render(scene,camera);
}
requestAnimationFrame(renderLoop);

</script>
