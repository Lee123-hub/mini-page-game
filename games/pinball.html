<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弹珠消消乐</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#1a1a2e;border-bottom:1px solid #2d2d4e;flex-shrink:0;height:48px}
.back-btn{color:#a0aec0;text-decoration:none;font-size:.9rem;padding:5px 12px;border:1px solid #4a5568;border-radius:8px}
.back-btn:hover{color:#fff;border-color:#fff}
.game-title{font-size:1rem;font-weight:700;color:#e2e8f0}
#c{display:block;flex:1;width:100%}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal.hidden{display:none}
.modal-box{background:linear-gradient(135deg,#1a1a3e,#0d0d2a);border:1.5px solid rgba(120,160,255,.4);border-radius:24px;padding:32px 40px;text-align:center;max-width:380px;width:92%;box-shadow:0 0 70px rgba(80,120,255,.3)}
.modal-box h2{font-size:2rem;margin-bottom:8px}
.subtitle{color:#a0b0cc;font-size:.88rem;margin-bottom:22px;line-height:1.8}
.btn{display:inline-block;padding:13px 36px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:50px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .12s,box-shadow .12s;margin:4px}
.btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 28px rgba(102,126,234,.6)}
.stat-row{display:flex;gap:12px;margin:16px 0}
.stat-box{flex:1;background:rgba(255,255,255,.06);border-radius:14px;padding:12px;text-align:center}
.stat-box .val{font-size:1.8rem;font-weight:800;color:#a78bfa}
.stat-box .lbl{font-size:.73rem;color:#718096;margin-top:2px}
</style>
</head>
<body>
<div class="topbar">
  <a class="back-btn" href="../index.html">← 返回</a>
  <div class="game-title">🔮 弹珠消消乐</div>
  <div style="width:64px"></div>
</div>
<canvas id="c"></canvas>

<div class="modal" id="startModal">
  <div class="modal-box">
    <h2>🔮 弹珠消消乐</h2>
    <div class="subtitle">
      移动鼠标/手指 <b style="color:#a78bfa">瞄准</b><br>
      点击 <b style="color:#86efac">发射弹珠</b><br>
      消除 <b style="color:#fbbf24">3个以上</b> 同色弹珠<br>
      清空全部弹珠即可通关！
    </div>
    <button class="btn" onclick="startGame()">✨ 开始游戏</button>
  </div>
</div>

<div class="modal hidden" id="overModal">
  <div class="modal-box">
    <h2 id="overTitle">💀 游戏结束</h2>
    <div class="stat-row">
      <div class="stat-box"><div class="val" id="overScore">0</div><div class="lbl">分数</div></div>
      <div class="stat-box"><div class="val" id="overWave">1</div><div class="lbl">关卡</div></div>
      <div class="stat-box"><div class="val" id="overShots">0</div><div class="lbl">发射数</div></div>
    </div>
    <button class="btn" onclick="restartGame()">🔄 再来一局</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Layout ─────────────────────────────────────────────────────────────────
const R = 18; // ball radius
const COLORS = ['#f87171','#fb923c','#fbbf24','#4ade80','#60a5fa','#a78bfa','#f472b6'];
const COLOR_NAMES = ['红','橙','黄','绿','蓝','紫','粉'];
let W, H, colCount, rowCount, originX, originY;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  W = rect.width; H = rect.height;
  colCount = Math.floor((W - 20) / (R * 2));
  if (colCount > 16) colCount = 16;
  originX = (W - colCount * R * 2) / 2 + R;
  originY = R + 8;
}

// ── State ──────────────────────────────────────────────────────────────────
let grid = [];      // grid[row][col] = colorIdx or -1
let ballRows = 0;
let wave = 1;
let score = 0;
let shots = 0;
let shotsThisWave = 0;
let gameRunning = false;
let deadLine = 0;   // y below which = game over

let shooter = { x:0, angle: -Math.PI/2 }; // angle: 0=right, -PI/2=up
let bullet = null;  // { x,y,vx,vy,color }
let nextColor = 0;
let pendingDrop = false;
let dropTimer = 0;

// particles
let particles = [];

// ── Grid helpers ────────────────────────────────────────────────────────────
function rowY(row) { return originY + row * (R * 1.72); }
function colX(col, row) {
  const offset = (row % 2 === 0) ? 0 : R;
  return originX + col * R * 2 + offset;
}
function gridToXY(row, col) { return { x: colX(col, row), y: rowY(row) }; }

function nearestCell(x, y) {
  let best = null, bestD = Infinity;
  for (let row = 0; row < grid.length; row++) {
    for (let col = 0; col < colCount + (row % 2 === 0 ? 0 : -1); col++) {
      const dx = x - colX(col, row), dy = y - rowY(row);
      const d = dx*dx + dy*dy;
      if (d < bestD) { bestD = d; best = {row, col}; }
    }
  }
  return best;
}

function getNeighbors(row, col) {
  const even = row % 2 === 0;
  return [
    [row-1, col + (even ? -1 : 0)],
    [row-1, col + (even ?  0 : 1)],
    [row,   col-1],
    [row,   col+1],
    [row+1, col + (even ? -1 : 0)],
    [row+1, col + (even ?  0 : 1)],
  ].filter(([r,c]) => r>=0 && r<grid.length && c>=0 && c<colCount-(r%2));
}

function floodFill(row, col, colorIdx, visited) {
  const key = row+','+col;
  if (visited.has(key)) return [];
  if (row<0||row>=grid.length||col<0||col>=colCount-(row%2)) return [];
  if (grid[row][col] !== colorIdx) return [];
  visited.add(key);
  let result = [{row, col}];
  for (const [nr,nc] of getNeighbors(row,col)) {
    result = result.concat(floodFill(nr,nc,colorIdx,visited));
  }
  return result;
}

function floodFillConnected(row, col, visited) {
  // flood fill all connected non-empty cells from (row,col)
  const key = row+','+col;
  if (visited.has(key)) return [];
  if (row<0||row>=grid.length||col<0||col>=colCount-(row%2)) return [];
  if (grid[row][col] === -1) return [];
  visited.add(key);
  let result = [{row,col}];
  for (const [nr,nc] of getNeighbors(row,col)) {
    result = result.concat(floodFillConnected(nr,nc,visited));
  }
  return result;
}

function removeFloating() {
  // find all connected to top row
  const connected = new Set();
  for (let c = 0; c < colCount; c++) {
    if (grid[0] && grid[0][c] !== -1) floodFillConnected(0,c,connected);
  }
  let floatCount = 0;
  for (let r=0;r<grid.length;r++) {
    for (let c=0;c<colCount-(r%2);c++) {
      if (grid[r][c] !== -1) {
        const key = r+','+c;
        if (!connected.has(key)) {
          const {x,y} = gridToXY(r,c);
          spawnParticles(x,y,grid[r][c],6);
          grid[r][c] = -1;
          floatCount++;
        }
      }
    }
  }
  if (floatCount > 0) score += floatCount * 25 * wave;
}

function spawnParticles(x,y,colorIdx,count) {
  for (let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 80 + Math.random()*140;
    particles.push({
      x,y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 60,
      r: 4+Math.random()*4,
      color: COLORS[colorIdx],
      life:1, decay: 0.9+Math.random()*0.08
    });
  }
}

// ── Init ────────────────────────────────────────────────────────────────────
function makeGrid(rows) {
  const colors = wave <= 3 ? Math.min(wave+2, COLORS.length) : Math.min(wave+2, COLORS.length);
  const maxC = Math.min(colors, COLORS.length);
  const g = [];
  for (let r=0;r<rows;r++) {
    const cols = colCount - (r%2);
    const row = [];
    for (let c=0;c<cols;c++) {
      row.push(r < rows-2 ? Math.floor(Math.random()*maxC) : (Math.random()<0.6?Math.floor(Math.random()*maxC):-1));
    }
    g.push(row);
  }
  return g;
}

function startGame() {
  document.getElementById('startModal').classList.add('hidden');
  wave = 1; score = 0; shots = 0;
  initWave();
  gameRunning = true;
  requestAnimationFrame(loop);
}

function restartGame() {
  document.getElementById('overModal').classList.add('hidden');
  wave = 1; score = 0; shots = 0;
  initWave();
  gameRunning = true;
}

function initWave() {
  resize();
  ballRows = Math.min(5 + wave, 10);
  grid = makeGrid(ballRows);
  deadLine = H - 130;
  bullet = null;
  shotsThisWave = 0;
  pendingDrop = false;
  nextColor = Math.floor(Math.random()*Math.min(wave+2,COLORS.length));
  shooter.x = W/2;
  shooter.angle = -Math.PI/2;
  particles = [];
}

function pickNextColor() {
  // pick from colors still on board
  const onBoard = new Set();
  for (let r=0;r<grid.length;r++)
    for (let c=0;c<colCount-(r%2);c++)
      if (grid[r][c]>=0) onBoard.add(grid[r][c]);
  if (onBoard.size === 0) return 0;
  const arr = [...onBoard];
  return arr[Math.floor(Math.random()*arr.length)];
}

function countBalls() {
  let n=0;
  for (let r=0;r<grid.length;r++)
    for (let c=0;c<colCount-(r%2);c++)
      if (grid[r][c]>=0) n++;
  return n;
}

// ── Aim line ────────────────────────────────────────────────────────────────
let aimX = W/2, aimY = 100;

function updateAim(px, py) {
  const dx = px - shooter.x, dy = py - (H - 80);
  if (dy < -5) { // only aim upward
    shooter.angle = Math.atan2(dy, dx);
    // clamp to reasonable angles
    if (shooter.angle > -0.18) shooter.angle = -0.18;
    if (shooter.angle < -Math.PI+0.18) shooter.angle = -Math.PI+0.18;
  }
}

function drawAimLine() {
  let x = shooter.x, y = H - 80;
  let dx = Math.cos(shooter.angle), dy = Math.sin(shooter.angle);
  ctx.save();
  ctx.setLineDash([6,8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x,y);
  let bounces = 0;
  while (bounces < 3 && y > originY) {
    const steps = 400;
    let hit = false;
    for (let i=1;i<=steps;i++) {
      const nx = x+dx*i*3, ny = y+dy*i*3;
      if (nx < R) { ctx.lineTo(nx,ny); dx=-dx; x=nx; y=ny; bounces++; hit=true; break; }
      if (nx > W-R) { ctx.lineTo(nx,ny); dx=-dx; x=nx; y=ny; bounces++; hit=true; break; }
      if (ny < originY) { ctx.lineTo(nx,ny); hit=true; x=nx; y=ny; break; }
    }
    if (!hit) { ctx.lineTo(x+dx*400*3,y+dy*400*3); break; }
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── Bullet ──────────────────────────────────────────────────────────────────
function shoot() {
  if (bullet) return;
  const speed = 700;
  bullet = {
    x: shooter.x, y: H-80,
    vx: Math.cos(shooter.angle)*speed,
    vy: Math.sin(shooter.angle)*speed,
    color: nextColor
  };
  nextColor = pickNextColor();
  shots++;
  shotsThisWave++;
}

function updateBullet(dt) {
  if (!bullet) return;
  bullet.x += bullet.vx * dt;
  bullet.y += bullet.vy * dt;
  // wall bounce
  if (bullet.x < R) { bullet.x = R; bullet.vx *= -1; }
  if (bullet.x > W-R) { bullet.x = W-R; bullet.vx *= -1; }
  // ceiling
  if (bullet.y <= originY + R) {
    snapBullet(0, Math.round((bullet.x - originX) / (R*2)));
    return;
  }
  // hit grid
  for (let r=0;r<grid.length;r++) {
    for (let c=0;c<colCount-(r%2);c++) {
      if (grid[r][c] === -1) continue;
      const {x,y} = gridToXY(r,c);
      const dx=bullet.x-x, dy=bullet.y-y;
      if (dx*dx+dy*dy < (R*1.95)*(R*1.95)) {
        // snap to nearest empty neighbor
        snapNear(bullet.x, bullet.y, r, c);
        return;
      }
    }
  }
  // out of bounds bottom
  if (bullet.y > H) { bullet = null; }
}

function snapNear(bx, by, hr, hc) {
  // find empty neighbor cells closest to bullet position
  const neighbors = getNeighbors(hr, hc);
  // also consider row above the hit
  let best = null, bestD = Infinity;
  for (const [nr,nc] of neighbors) {
    if (nr>=0&&nc>=0&&nr<grid.length&&nc<colCount-(nr%2)&&grid[nr][nc]===-1) {
      const {x,y}=gridToXY(nr,nc);
      const d=(bx-x)**2+(by-y)**2;
      if (d<bestD){bestD=d;best=[nr,nc];}
    }
  }
  // also try row 0 or new row
  if (!best) {
    // append a new row or snap to ceiling
    const row = Math.max(0, Math.round((by - originY)/(R*1.72)));
    const off = row%2===0?0:R;
    const col = Math.round((bx - originX - off)/(R*2));
    if (row < grid.length) {
      while (grid.length <= row) grid.push(new Array(colCount-(grid.length%2)).fill(-1));
      const clampedCol = Math.max(0, Math.min(col, colCount-(row%2)-1));
      if (grid[row][clampedCol]===-1) best=[row,clampedCol];
    }
  }
  if (best) {
    placeBullet(best[0], best[1]);
  } else {
    bullet = null;
  }
}

function snapBullet(row, col) {
  const clampedCol = Math.max(0, Math.min(col, colCount-(row%2)-1));
  placeBullet(row, clampedCol);
}

function placeBullet(row, col) {
  const colorIdx = bullet.color;
  while (grid.length <= row) grid.push(new Array(colCount-(grid.length%2)).fill(-1));
  if (col<0) col=0;
  if (col>=colCount-(row%2)) col=colCount-(row%2)-1;
  grid[row][col] = colorIdx;
  bullet = null;
  spawnParticles(colX(col,row),rowY(row),colorIdx,3);
  // check match
  const cluster = floodFill(row, col, colorIdx, new Set());
  if (cluster.length >= 3) {
    score += cluster.length * 10 * wave;
    for (const {row:r,col:c} of cluster) {
      spawnParticles(colX(c,r),rowY(r),grid[r][c],8);
      grid[r][c] = -1;
    }
    removeFloating();
    // check win
    if (countBalls() === 0) {
      score += 500 * wave;
      wave++;
      setTimeout(()=>initWave(), 600);
      return;
    }
  }
  // drop row check: every 8 shots
  if (shotsThisWave > 0 && shotsThisWave % 8 === 0) {
    pendingDrop = true;
    dropTimer = 0.4;
  }
  // check game over: any ball below dead line
  checkGameOver();
}

function checkGameOver() {
  for (let r=0;r<grid.length;r++) {
    for (let c=0;c<colCount-(r%2);c++) {
      if (grid[r][c]>=0 && rowY(r) > deadLine) {
        endGame();
        return;
      }
    }
  }
}

function endGame() {
  gameRunning = false;
  document.getElementById('overTitle').textContent = '💀 游戏结束';
  document.getElementById('overScore').textContent = score;
  document.getElementById('overWave').textContent = wave;
  document.getElementById('overShots').textContent = shots;
  document.getElementById('overModal').classList.remove('hidden');
}

// ── Drop new row ────────────────────────────────────────────────────────────
function dropRow() {
  const maxC = Math.min(wave+2, COLORS.length);
  const newRow = [];
  for (let c=0;c<colCount;c++) newRow.push(Math.random()<0.7?Math.floor(Math.random()*maxC):-1);
  grid.unshift(newRow);
  checkGameOver();
}

// ── Draw ────────────────────────────────────────────────────────────────────
function drawBall(x,y,colorIdx,alpha) {
  alpha = alpha||1;
  const col = COLORS[colorIdx];
  const grad = ctx.createRadialGradient(x-R*.3,y-R*.3,R*.05,x,y,R*.98);
  grad.addColorStop(0,'rgba(255,255,255,0.7)');
  grad.addColorStop(0.4,col);
  grad.addColorStop(1,shadeColor(col,-40));
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(x,y,R-.5,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.globalAlpha=1;
}

function shadeColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16)+amt;
  let g=parseInt(hex.slice(3,5),16)+amt;
  let b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.min(255,Math.max(0,r));
  g=Math.min(255,Math.max(0,g));
  b=Math.min(255,Math.max(0,b));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawScene() {
  ctx.clearRect(0,0,W,H);
  // background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d0d1f'); bg.addColorStop(1,'#0f0f2a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // dead line
  ctx.strokeStyle='rgba(248,113,113,0.35)';
  ctx.lineWidth=2;
  ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(0,deadLine);ctx.lineTo(W,deadLine);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(248,113,113,0.4)';
  ctx.font='12px sans-serif';
  ctx.textAlign='right';
  ctx.fillText('危险线',W-8,deadLine-5);

  // grid balls
  for (let r=0;r<grid.length;r++) {
    for (let c=0;c<colCount-(r%2);c++) {
      if (grid[r][c]>=0) {
        const {x,y}=gridToXY(r,c);
        drawBall(x,y,grid[r][c]);
      }
    }
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha=p.life;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // shooter base
  const sx=shooter.x, sy=H-80;
  // platform
  const pg=ctx.createLinearGradient(sx-32,sy+10,sx+32,sy+10);
  pg.addColorStop(0,'#667eea');pg.addColorStop(1,'#764ba2');
  ctx.fillStyle=pg;
  ctx.beginPath();
  ctx.roundRect(sx-32,sy+12,64,28,14);
  ctx.fill();
  // cannon barrel
  ctx.save();
  ctx.translate(sx,sy);
  ctx.rotate(shooter.angle+Math.PI/2);
  const bgrad=ctx.createLinearGradient(-8,0,8,0);
  bgrad.addColorStop(0,'#a78bfa');bgrad.addColorStop(1,'#7c3aed');
  ctx.fillStyle=bgrad;
  ctx.beginPath();
  ctx.roundRect(-8,-34,16,34,6);
  ctx.fill();
  ctx.restore();

  // current & next ball preview
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath();ctx.arc(sx,sy,R+3,0,Math.PI*2);ctx.fill();
  drawBall(sx,sy,nextColor);
  // label
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='11px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('下一颗',sx,sy+R+18);

  // aim line
  drawAimLine();

  // HUD
  ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='bold 14px sans-serif';
  ctx.fillText('分数: '+score, 14, H-12);
  ctx.textAlign='right';
  ctx.fillText('关卡: '+wave+'  发射: '+shots, W-14, H-12);
}

// ── Loop ─────────────────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts-last)/1000, 0.05);
  last = ts;

  updateBullet(dt);

  // update particles
  for (const p of particles) {
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy+=200*dt; // gravity
    p.life*=p.decay;
  }
  particles=particles.filter(p=>p.life>0.02);

  // drop timer
  if (pendingDrop) {
    dropTimer -= dt;
    if (dropTimer <= 0) { dropRow(); pendingDrop=false; }
  }

  drawScene();
  requestAnimationFrame(loop);
}

// ── Input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  updateAim(e.clientX-r.left, e.clientY-r.top);
});
canvas.addEventListener('click', e=>{
  if (!gameRunning) return;
  const r=canvas.getBoundingClientRect();
  updateAim(e.clientX-r.left, e.clientY-r.top);
  shoot();
});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  updateAim(t.clientX-r.left, t.clientY-r.top);
},{passive:false});
canvas.addEventListener('touchend', e=>{
  if (!gameRunning) return;
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const t=e.changedTouches[0];
  updateAim(t.clientX-r.left, t.clientY-r.top);
  shoot();
},{passive:false});

window.addEventListener('resize', ()=>{
  if (gameRunning) {
    const oldW=W;
    resize();
    shooter.x = shooter.x * W/oldW;
  } else { resize(); }
});

resize();
</script>
</body>
</html>
