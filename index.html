<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小游戏合集</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      padding: 24px 40px;
      background: #1a1a2e;
      border-bottom: 1px solid #2d2d4e;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      flex: 1;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-title span {
      display: block;
      font-size: 0.9rem;
      font-weight: 400;
      color: #718096;
      -webkit-text-fill-color: #718096;
      margin-top: 4px;
    }

    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .qr-label {
      font-size: 0.8rem;
      color: #a0aec0;
    }

    .qr-codes {
      display: flex;
      gap: 12px;
    }

    .qr-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .qr-item img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      border: 2px solid #2d2d4e;
      background: #fff;
      object-fit: contain;
    }

    .qr-item span {
      font-size: 0.7rem;
      color: #718096;
    }

    main {
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 1.1rem;
      color: #718096;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .game-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      text-decoration: none;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
      border-color: #667eea;
    }

    .card-icon {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }

    .card-footer {
      padding: 16px;
      border-top: 1px solid #2d2d4e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .help-btn {
      position: relative;
      font-size: 1.1rem;
      cursor: default;
      line-height: 1;
      padding: 2px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .help-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .help-popup {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      width: 240px;
      background: rgba(15, 15, 30, 0.97);
      border: 1px solid #4a5568;
      color: #e2e8f0;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.6;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .help-popup::after {
      content: '';
      position: absolute;
      top: 100%;
      right: 8px;
      border: 6px solid transparent;
      border-top-color: #4a5568;
    }

    .help-btn:hover .help-popup {
      display: block;
    }

    .help-popup-title {
      font-weight: 700;
      color: #90cdf4;
      margin-bottom: 6px;
      font-size: 0.88rem;
    }

    @media (max-width: 900px) {
      .game-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .game-grid { grid-template-columns: 1fr; }
      header { padding: 16px 20px; flex-wrap: wrap; }
      main { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      小游戏合集
      <span>纯网页游戏，无需安装</span>
    </div>
    <div class="qr-section">
      <div class="qr-label">☕ 请作者喝咖啡</div>
      <div class="qr-codes">
        <div class="qr-item">
          <img src="wx.png" alt="微信收款码">
          <span>微信</span>
        </div>
        <div class="qr-item">
          <img src="zfb.png" alt="支付宝收款码">
          <span>支付宝</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="section-title">全部游戏</div>
    <div class="game-grid" id="grid"></div>
  </main>

  <script>
    const GAMES = [
      {
        title: '五子棋',
        emoji: '⚫',
        bg: 'linear-gradient(135deg, #f5a623 0%, #d4843a 100%)',
        url: 'games/gomoku.html',
        rulesTitle: '五子棋规则',
        rules: '两人对弈，黑方先手。双方轮流在棋盘交叉点落子，先将五枚同色棋子连成一线（横、竖、斜线均可）者获胜。'
      },
      {
        title: '中国象棋',
        emoji: '🀄',
        bg: 'linear-gradient(135deg, #e53e3e 0%, #9b2335 100%)',
        url: 'games/xiangqi.html',
        rulesTitle: '中国象棋规则',
        rules: '红方先手，双方轮流走子。将/帅不能出九宫，士/仕斜走不出宫，象/相斜走不过河，马走日（马腿），炮吃子须跳一棋（炮台），兵/卒过河后可横走。两将不得对面（飞将）。将死或困毙对方为胜。'
      },
      {
        title: '国际象棋',
        emoji: '♟',
        bg: 'linear-gradient(135deg, #4a5568 0%, #2d3748 100%)',
        url: 'games/chess.html',
        rulesTitle: '国际象棋规则',
        rules: '白方先手。王：一格任意方向；后：任意方向任意格；车：直线任意格；象：斜线任意格；马：L形跳跃；兵：向前一格（初始可两格），斜前方吃子。特殊：王车易位、兵的升变、过路兵。将死（无法解将）或逼和判定胜负。'
      },
    ];

    const grid = document.getElementById('grid');

    GAMES.forEach(game => {
      const card = document.createElement('a');
      card.className = 'game-card';
      card.href = game.url;
      card.innerHTML = `
        <div class="card-icon" style="background:${game.bg}">${game.emoji}</div>
        <div class="card-footer">
          <span class="card-title">${game.title}</span>
          <span class="help-btn">❓
            <div class="help-popup">
              <div class="help-popup-title">${game.rulesTitle}</div>
              ${game.rules}
            </div>
          </span>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
